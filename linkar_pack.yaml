templates:
  demultiplex:
    outdir:
      function: get_demultiplex_render_outdir
    params:
      samplesheet:
        function: get_api_samplesheet
      threads:
        function: get_host_max_cpus
  nfcore_3mrnaseq:
    params:
      samplesheet:
        function: generate_nfcore_rnaseq_samplesheet_forward
      genome:
        function: get_agendo_genome
      max_cpus:
        function: get_host_max_cpus
      max_memory:
        function: get_host_max_memory
  nfcore_methylseq:
    params:
      samplesheet:
        function: generate_nfcore_methylseq_samplesheet
      genome:
        function: get_agendo_genome
      project_name:
        function: get_project_name
      max_cpus:
        function: get_host_max_cpus
      max_memory:
        function: get_host_max_memory
  cellranger_atac:
    params:
      fastq_dir:
        function: get_demultiplex_fastq_dir
      localcores:
        function: get_host_max_cpus
  dgea:
    params:
      salmon_dir:
        function: get_dgea_salmon_dir
      samplesheet:
        function: get_dgea_samplesheet
      organism:
        function: get_dgea_organism
      application:
        function: get_dgea_application
      name:
        function: get_dgea_name
      authors:
        function: get_dgea_authors
  ercc:
    params:
      salmon_dir:
        function: get_dgea_salmon_dir
      samplesheet:
        function: get_dgea_samplesheet
      authors:
        function: get_dgea_authors
  methylation_array_analysis:
    params:
      authors:
        function: get_dgea_authors
  multiqc:
    params:
      input_dir:
        template: demultiplex
        output: results_dir
