id: cellranger_atac
version: 0.1.0
description: Run cellranger-atac count per discovered sample and optionally aggregate the resulting libraries.
tools:
  required:
    - python3
params:
  fastq_dir:
    type: path
    required: true
    description: Directory containing FASTQ files for one or more Cell Ranger ATAC samples.
  reference:
    type: path
    required: true
    description: Path to a Cell Ranger ATAC reference such as refdata-cellranger-atac-mm10-1.2.0.
  cellranger_atac_bin:
    type: str
    default: cellranger-atac
    description: Executable used for both count and aggr.
  run_aggr:
    type: bool
    default: true
    description: When true, generate aggregation.csv and run cellranger-atac aggr if at least two samples are discovered.
  localcores:
    type: int
    default: 0
    description: Optional localcores value passed through to cellranger-atac when greater than zero.
  localmem:
    type: int
    default: 0
    description: Optional localmem in GB passed through to cellranger-atac when greater than zero.
outputs:
  results_dir: {}
  counts_dir:
    path: counts
  combined_dir:
    path: combined
  aggregation_csv:
    path: aggregation.csv
  samples_manifest:
    path: samples.json
  software_versions:
    path: software_versions.json
  count_web_summaries:
    glob: counts/*/outs/web_summary.html
  count_summary_csvs:
    glob: counts/*/outs/summary.csv
  count_cloupe_files:
    glob: counts/*/outs/cloupe.cloupe
  count_fragment_files:
    glob: counts/*/outs/fragments.tsv.gz
  count_fragment_indexes:
    glob: counts/*/outs/fragments.tsv.gz.tbi
  count_singlecell_csvs:
    glob: counts/*/outs/singlecell.csv
  count_peak_beds:
    glob: counts/*/outs/peaks.bed
  count_peak_annotations:
    glob: counts/*/outs/peak_annotation.tsv
  count_filtered_peak_matrix_h5s:
    glob: counts/*/outs/filtered_peak_bc_matrix.h5
  count_filtered_tf_matrix_h5s:
    glob: counts/*/outs/filtered_tf_bc_matrix.h5
  aggr_web_summary:
    path: combined/outs/web_summary.html
  aggr_summary_csv:
    path: combined/outs/summary.csv
  aggr_cloupe:
    path: combined/outs/cloupe.cloupe
  aggr_fragments:
    path: combined/outs/fragments.tsv.gz
  aggr_fragments_index:
    path: combined/outs/fragments.tsv.gz.tbi
  aggr_singlecell_csv:
    path: combined/outs/singlecell.csv
  aggr_peak_bed:
    path: combined/outs/peaks.bed
  aggr_peak_annotation:
    path: combined/outs/peak_annotation.tsv
  aggr_filtered_peak_matrix_h5:
    path: combined/outs/filtered_peak_bc_matrix.h5
  aggr_filtered_tf_matrix_h5:
    path: combined/outs/filtered_tf_bc_matrix.h5
run:
  mode: direct
  verbose_by_default: true
  command: |
    python3 ./run.py \
      --results-dir "${LINKAR_RESULTS_DIR}" \
      --fastq-dir "${param:fastq_dir}" \
      --reference "${param:reference}" \
      --cellranger-atac-bin "${param:cellranger_atac_bin}" \
      --run-aggr "${param:run_aggr}" \
      --localcores "${param:localcores}" \
      --localmem "${param:localmem}"
