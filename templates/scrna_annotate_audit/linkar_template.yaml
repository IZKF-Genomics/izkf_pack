id: scrna_annotate_audit
version: 0.1.1
description: Cluster-level audit of multiple scRNA-seq annotation providers with review tables and final h5ad annotation output.
tools:
  required:
    - bash
    - python3
    - pixi
params:
  input_h5ad:
    type: str
    default: ""
    description: Prepared `.h5ad` input path. When empty, the audit reuses the h5ad recorded by provider annotation results or the upstream `scrna_prep` output.
  input_source_template:
    type: str
    default: ""
    description: Optional provenance label for the upstream template that produced `input_h5ad`.
  organism:
    type: str
    default: "mouse"
    description: Dataset organism recorded in audit outputs.
  tissue:
    type: str
    default: ""
    description: Optional tissue or biological context recorded in audit outputs.
  cluster_key:
    type: str
    default: "leiden"
    description: Cluster column used for cluster-level audit and final annotation mapping.
  sample_id_key:
    type: str
    default: "sample_id"
    description: Optional sample identifier column in `adata.obs`.
  expression_layer:
    type: str
    default: "X"
    description: Expression layer used for marker expression evidence summaries.
  write_h5ad:
    type: bool
    default: true
    description: Write `results/adata.final_annotated.h5ad` with final or draft audit annotation columns.
  write_cloupe:
    type: bool
    default: true
    description: Attempt to write `results/adata.final_annotated.cloupe` from the final h5ad.
  selected_umap_key:
    type: str
    default: "X_umap"
    description: UMAP embedding key copied to `obsm['X_umap']` in the final h5ad and used for Loupe export.
  selected_umap_reason:
    type: str
    default: "Default project UMAP retained. Update this after reviewing the UMAP candidate page."
    description: Human-readable rationale for the final project UMAP selection.
# Output paths and globs are resolved relative to LINKAR_RESULTS_DIR,
# which defaults to <template_workspace>/results.
outputs:
  results_dir: {}
  software_versions:
    path: results/software_versions.json
  annotation_audit:
    path: results/annotation_audit.json
  annotation_cards:
    path: results/annotation_audit_cards.json
  final_h5ad:
    path: results/adata.final_annotated.h5ad
  final_cloupe:
    path: results/adata.final_annotated.cloupe
  html_report:
    path: results/report.html
  quarto_report:
    path: results/report.qmd
  static_html_report:
    path: results/audit_report_static.html
  static_quarto_report:
    path: results/audit_report_static.qmd
  umap_candidates:
    path: results/umap_candidates.npz
  tables:
    glob: results/tables/*.csv
cleanup:
  - path: .pixi
    type: dir
  - path: __pycache__
    type: dir
run:
  mode: render
  entry: run.sh
