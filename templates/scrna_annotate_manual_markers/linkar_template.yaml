id: scrna_annotate_manual_markers
version: 0.1.1
description: Manual marker gene scRNA-seq cluster annotation using Scanpy marker-program scores and a rich Quarto review report.
tools:
  required:
    - bash
    - python3
    - pixi
params:
  input_h5ad:
    type: str
    default: ""
    description: Prepared `.h5ad` input path. When empty, the template uses the standard upstream `scrna_prep` output when available.
  input_source_template:
    type: str
    default: ""
    description: Optional provenance label for the upstream template that produced `input_h5ad`.
  organism:
    type: str
    default: "mouse"
    description: Optional organism label recorded in the result JSON.
  tissue:
    type: str
    default: ""
    description: Optional tissue or biological context recorded in the report.
  cluster_key:
    type: str
    default: "leiden"
    description: Cluster column in `adata.obs`.
  sample_id_key:
    type: str
    default: "sample_id"
    description: Optional sample identifier column in `adata.obs`.
  expression_layer:
    type: str
    default: "X"
    description: Expression layer/view used for marker ranking.
  marker_catalog:
    type: str
    default: "config/marker_genes.csv"
    description: Manual marker gene CSV/TSV. Legacy two-column-plus format and headered files are supported.
  score_layer:
    type: str
    default: "X"
    description: Expression layer/view used for `scanpy.tl.score_genes`.
  score_method:
    type: str
    default: "scanpy_score_genes"
    description: Marker scoring method. Version 1 implements `scanpy_score_genes`.
  top_n_markers:
    type: int
    default: 50
    description: Number of ranked marker genes to keep per cluster for review.
  min_log2fc:
    type: str
    default: "0.25"
    description: Minimum log2 fold-change used to label ranked markers as informative in review tables.
  min_score_margin:
    type: str
    default: "0.15"
    description: Minimum top-vs-second cluster mean z-score margin for medium confidence.
  write_h5ad:
    type: bool
    default: true
    description: Write `results/adata.annotated.h5ad` with cluster-level annotation columns added to `adata.obs`.
outputs:
  results_dir: {}
  software_versions:
    path: results/software_versions.json
  annotation_result:
    path: results/annotation_result.json
  annotated_h5ad:
    path: results/adata.annotated.h5ad
  html_report:
    path: results/report.html
  quarto_report:
    path: results/report.qmd
  tables:
    glob: results/tables/*.csv
cleanup:
  - path: .pixi
    type: dir
  - path: __pycache__
    type: dir
run:
  mode: render
  entry: run.sh
