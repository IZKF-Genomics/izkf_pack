tools:
  - pixi
  - python

software:
  - name: scanpy
    command: pixi run python -c "import scanpy; print(scanpy.__version__)"
  - name: anndata
    command: pixi run python -c "import anndata; print(anndata.__version__)"

params:
  - name: cluster_key
    env: CLUSTER_KEY
  - name: marker_catalog
    env: MARKER_CATALOG
  - name: expression_layer
    env: EXPRESSION_LAYER
