id: export_del
version: 0.2.0
description: Delete an exported web project from the facility export engine.
tools:
  required:
    - python3
params:
  job_id:
    type: str
    default: ""
    description: Optional export engine job id to clean up instead of deleting by project id.
  project_id:
    type: str
    default: ""
    description: Export project id/name to delete from the configured web backends.
  export_engine_api_url:
    type: str
    default: http://genomics.rwth-aachen.de:9500/export
    description: Export engine base URL. If it does not end with /export, the suffix is appended automatically.
  confirm_delete:
    type: bool
    default: true
    description: Must remain true to perform the deletion request. Set false to block accidental execution.
  legacy_project_delete:
    type: bool
    default: false
    description: Backward-compatible no-op. Project deletion is the default when project_id is provided.
outputs:
  results_dir: {}
  delete_response:
    path: delete_response.json
  export_job_id:
    path: export_job_id.txt
  export_project_id:
    path: export_project_id.txt
run:
  mode: direct
  verbose_by_default: true
  command: |
    python3 ./run.py \
      --results-dir "${LINKAR_RESULTS_DIR}" \
      --job-id "${param:job_id}" \
      --project-id "${param:project_id}" \
      --export-engine-api-url "${param:export_engine_api_url}" \
      --confirm-delete "${param:confirm_delete}" \
      --legacy-project-delete "${param:legacy_project_delete}"
