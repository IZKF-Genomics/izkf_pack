id: dgea
version: 0.1.0
description: Editable DGEA workspace with Pixi, Positron, and Quarto support.
tools:
  required:
    - pixi
    - quarto
    - Rscript
params:
  salmon_dir:
    type: path
    required: true
    description: Path to the salmon quant directory from nfcore_rnaseq or nfcore_3mrnaseq.
  samplesheet:
    type: path
    required: true
    description: nf-core samplesheet CSV with at least a sample column and ideally explicit group metadata.
  organism:
    type: str
    required: true
    description: Organism identifier such as hsapiens, mmusculus, rnorvegicus, or sscrofa.
  spikein:
    type: str
    default: ""
    description: Optional spike-in description. Values containing ERCC enable ERCC filtering in the reports.
  application:
    type: str
    default: ""
    description: Upstream application label used to choose countsFromAbundance handling.
  name:
    type: str
    default: ""
    description: Project name shown in reports.
  authors:
    type: str
    default: ""
    description: Comma-separated author names shown in reports.
outputs:
  results_dir: {}
  run_info:
    path: run_info.yaml
  software_versions:
    path: software_versions.json
  html_reports:
    glob: "*.html"
  qmd_reports:
    glob: "*.qmd"
  samplesheet_exports:
    glob: "*.csv"
  xlsx_exports:
    glob: "*.xlsx"
run:
  mode: render
  command: |
    mkdir -p "./results"
    python ./build_dgea_inputs.py \
      --workspace-dir "." \
      --results-dir "./results" \
      --salmon-dir "${param:salmon_dir}" \
      --samplesheet "${param:samplesheet}" \
      --organism "${param:organism}" \
      --spikein "${param:spikein}" \
      --application "${param:application}" \
      --name "${param:name}" \
      --authors "${param:authors}"

    pixi install
    pixi run install-bioc-data
    pixi run Rscript DGEA_constructor.R
    python3 - <<PY
    import json
    import subprocess
    from pathlib import Path

    def version_entry(name, command):
        completed = subprocess.run(command, check=False, capture_output=True, text=True)
        raw = "\\n".join(part.strip() for part in (completed.stdout, completed.stderr) if part.strip())
        return {
            "name": name,
            "version": raw.splitlines()[0] if raw else "",
            "raw": raw,
            "command": " ".join(command),
            "source": "command",
            "returncode": completed.returncode,
        }

    payload = {
        "software": [
            version_entry("pixi", ["pixi", "--version"]),
            version_entry("quarto", ["quarto", "--version"]),
            version_entry("R", ["pixi", "run", "Rscript", "--version"]),
            {
                "name": "organism",
                "version": "${param:organism}",
                "source": "param",
            },
            {
                "name": "application",
                "version": "${param:application}",
                "source": "param",
            },
        ]
    }
    path = Path("${LINKAR_RESULTS_DIR}") / "software_versions.json"
    path.parent.mkdir(parents=True, exist_ok=True)
    path.write_text(json.dumps(payload, indent=2, sort_keys=True), encoding="utf-8")
    PY
