id: dgea
version: 0.1.3
description: Editable DGEA workspace with Pixi, Positron, and Quarto support.
tools:
  required:
    - pixi
    - python3
params:
  salmon_dir:
    type: path
    required: true
    description: Path to the salmon quant directory from nfcore_rnaseq or nfcore_3mrnaseq.
  samplesheet:
    type: path
    required: true
    description: nf-core samplesheet CSV with at least a sample column and ideally explicit group metadata.
  organism:
    type: str
    required: true
    description: Organism identifier such as hsapiens, mmusculus, rnorvegicus, or sscrofa.
  spikein:
    type: str
    default: ""
    description: Optional spike-in description. Values containing ERCC enable ERCC filtering in the reports.
  application:
    type: str
    default: ""
    description: Upstream application label used to choose countsFromAbundance handling.
  name:
    type: str
    default: ""
    description: Project name shown in reports.
  authors:
    type: str
    default: ""
    description: Comma-separated author names shown in reports.
# Output paths and globs are resolved relative to LINKAR_RESULTS_DIR,
# which defaults to <template_workspace>/results.
outputs:
  results_dir: {}
  run_info:
    path: results/run_info.yaml
  software_versions:
    path: results/software_versions.json
  html_reports:
    glob: "*.html"
  qmd_reports:
    glob: "*.qmd"
  samplesheet_exports:
    glob: "*.csv"
  xlsx_exports:
    glob: "*.xlsx"
cleanup:
  - path: .pixi
    type: dir
  - path: __pycache__
    type: dir
run:
  mode: render
  entry: run.sh
render:
  command: |
    python3 "${LINKAR_PACK_ROOT}/functions/materialize_vscode_settings.py" \
      --template-dir "." \
      --workspace-dir "."
