id: summary
version: 0.1.2
description: Generate project-level analysis summaries from Linkar project history.
tools:
  required:
    - python3
params:
  project_dir:
    type: path
    default: ..
    description: Linkar project directory containing project.yaml. Defaults to the parent of the rendered analysis summary bundle.
  style:
    type: str
    default: publication
    description: Output style hint. Use publication, concise, or technical.
  metadata_api_url:
    type: str
    default: https://genomics.rwth-aachen.de/api
    description: Optional base URL for project-level combined metadata lookup by Agendo request id.
  use_llm:
    type: bool
    default: true
    description: When true, polish deterministic drafts through an OpenAI-compatible chat completions API. This template defaults to LLM polishing and falls back to deterministic drafts if LLM settings are missing.
  llm_config:
    type: path
    default: ""
    description: Optional YAML or JSON fallback describing LLM settings. The recommended default is for users to define LINKAR_LLM_API_KEY, LINKAR_LLM_BASE_URL, and LINKAR_LLM_MODEL in the environment.
  llm_base_url:
    type: str
    default: ""
    description: Optional OpenAI-compatible API base URL override. Otherwise use LINKAR_LLM_BASE_URL.
  llm_model:
    type: str
    default: ""
    description: Optional model name override. Otherwise use LINKAR_LLM_MODEL.
  llm_temperature:
    type: float
    default: 0.2
    description: Temperature used for optional LLM polishing.
# Output paths and globs are resolved relative to LINKAR_RESULTS_DIR,
# which defaults to <template_workspace>/results.
outputs:
  results_dir: {}
  summary_context:
    path: summary_context.yaml
  summary_long:
    path: summary_long.md
  summary_long_html:
    path: summary_long.html
  summary_short:
    path: summary_short.md
  summary_short_html:
    path: summary_short.html
  summary_references:
    path: summary_references.md
  summary_prompt:
    path: summary_prompt.md
  summary_response:
    path: summary_response.json
cleanup:
  - path: .pixi
    type: dir
  - path: __pycache__
    type: dir
run:
  mode: render
  verbose_by_default: true
  entry: run.sh
