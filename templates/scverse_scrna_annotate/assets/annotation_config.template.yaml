# User-facing configuration for scverse_scrna_annotate.
# Copy or edit this file as config/annotation_config.yaml and then run:
#   ./run.sh
#
# Environment variables still work and override YAML values when both are set.
# The runtime converts this YAML file into config/project.toml internally.

global:
  # Path to the input AnnData object.
  # Recommended: the latest scverse_scrna_prep output unless you intentionally
  # want to annotate an integration-stage object.
  input_h5ad: ""

  # Optional provenance label used in reports and metadata.
  # Examples: scverse_scrna_prep, scverse_scrna_integrate
  input_source_template: ""

  # Primary backend used for methods text and backward compatibility.
  # Current supported values: celltypist
  annotation_method: celltypist

  # Annotation sub-reports to render.
  # Current supported values: [celltypist]
  # Future Python-only backends may include: scanvi, decoupler_review, scgpt
  annotation_methods:
    - celltypist

  # Cluster column used for cluster-level review and final label assignment.
  cluster_key: leiden

  # Optional metadata columns used in tables and plots when present.
  batch_key: batch
  condition_key: condition
  sample_id_key: sample_id
  sample_label_key: sample_display

  # Minimum within-cluster dominant-label fraction before a cluster can be
  # auto-accepted instead of being flagged for manual review.
  majority_vote_min_fraction: 0.6

  # Minimum mean prediction confidence before a cluster can be auto-accepted.
  confidence_threshold: 0.5

  # Label used for unresolved clusters and cells that still need review.
  unknown_label: Unknown

  # Output obs column names written into results/adata.annotated.h5ad.
  predicted_label_key: predicted_label
  final_label_key: final_label

  # Number of top candidate labels to keep per cluster in summary tables.
  rank_top_markers: 5

  # Random seed for deterministic helper steps.
  random_seed: 0

celltypist:
  # Built-in CellTypist model name or path to a custom .pkl model.
  # Examples:
  #   Immune_All_Low.pkl
  #   /abs/path/to/custom_model.pkl
  model: ""

  # Prediction mode.
  # best_match: one label per cell
  # prob_match: threshold-aware multi-label mode
  mode: best_match

  # Probability threshold used by CellTypist when mode=prob_match.
  p_thres: 0.5

  # Request GPU acceleration when available.
  # Leave false unless your environment is configured for GPU CellTypist runs.
  use_gpu: false

marker_review:
  # Optional YAML file mapping candidate labels to marker genes.
  #
  # Supported marker file formats:
  #   T_cells:
  #     - CD3D
  #     - CD3E
  #
  #   B_cells:
  #     markers:
  #       - MS4A1
  #       - CD79A
  marker_file: ""
