id: scrna_annotate
version: 0.3.1
description: Provider-based single-cell RNA-seq annotation runner with a marker-based evidence MVP and standard provider JSON outputs.
tools:
  required:
    - bash
    - python3
    - pixi
params:
  input_h5ad:
    type: str
    default: ""
    description: Prepared `.h5ad` input path. This is intentionally a string so the template reads the upstream file in place instead of asking Linkar to stage/copy it.
  input_source_template:
    type: str
    default: ""
    description: Provenance label for the upstream template that produced `input_h5ad`.
  dataset_config:
    type: path
    default: "config/dataset.toml"
    description: Dataset-level metadata contract used by all providers.
  providers_config:
    type: path
    default: "config/providers.toml"
    description: Provider enablement and provider-specific parameters.
  cluster_key:
    type: str
    default: "leiden"
    description: Cluster column used to aggregate cell-level provider results and compare cluster-level annotations.
  organism:
    type: str
    default: ""
    description: Dataset organism, for example `human`, `mouse`, or `zebrafish`.
  tissue:
    type: str
    default: ""
    description: Optional tissue or biological context. Leave empty for exploratory annotation; tissue-sensitive providers may warn, lower confidence, or require explicit configuration.
  batch_key:
    type: str
    default: "batch"
    description: Optional batch column in `adata.obs`.
  condition_key:
    type: str
    default: "condition"
    description: Optional condition column in `adata.obs`.
  sample_id_key:
    type: str
    default: "sample_id"
    description: Optional sample identifier column in `adata.obs`.
  gene_id_type:
    type: str
    default: "gene_symbols"
    description: Declared gene identifier type for provider readiness checks. Expected values are `gene_symbols`, `ensembl`, or `auto`.
  expression_layer:
    type: str
    default: "X"
    description: Expression layer/view used by providers unless a provider config overrides it.
  provider_preset:
    type: str
    default: "default"
    description: Planned provider preset. `default` should remain conservative; experimental providers such as scGPT/scTab must require explicit configuration.
# Output paths and globs are resolved relative to LINKAR_RESULTS_DIR,
# which defaults to <template_workspace>/results.
outputs:
  results_dir: {}
  software_versions:
    path: results/software_versions.json
  dataset_profile:
    path: results/dataset_profile.json
  provider_index:
    path: results/provider_index.json
  provider_results:
    glob: results/providers/*/annotation_result.json
  provider_logs:
    glob: results/providers/*/logs/*
  provider_reports:
    glob: results/providers/*/report.*
  provider_tables:
    glob: results/providers/*/tables/*.csv
cleanup:
  - path: .pixi
    type: dir
  - path: __pycache__
    type: dir
run:
  mode: render
  entry: run.sh
