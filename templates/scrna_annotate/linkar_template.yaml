id: scrna_annotate
version: 0.2.0-design
description: Design-only scaffold for a provider-based single-cell RNA-seq annotation runner that emits standard annotation JSON files.
tools:
  required:
    - bash
params:
  input_h5ad:
    type: path
    default: ""
    description: Prepared `.h5ad` input. The default binding prefers the latest `scrna_prep` output, then `scrna_integrate` when available.
  input_source_template:
    type: str
    default: ""
    description: Provenance label for the upstream template that produced `input_h5ad`.
  dataset_config:
    type: path
    default: "config/dataset.toml"
    description: Dataset-level metadata contract used by all providers.
  providers_config:
    type: path
    default: "config/providers.toml"
    description: Provider enablement and provider-specific parameters.
  cluster_key:
    type: str
    default: "leiden"
    description: Cluster column used to aggregate cell-level provider results and compare cluster-level annotations.
  organism:
    type: str
    default: ""
    description: Dataset organism, for example `human`, `mouse`, or `zebrafish`.
  tissue:
    type: str
    default: ""
    description: Tissue or biological context. This should usually be set explicitly because marker databases and references are tissue-sensitive.
  batch_key:
    type: str
    default: "batch"
    description: Optional batch column in `adata.obs`.
  condition_key:
    type: str
    default: "condition"
    description: Optional condition column in `adata.obs`.
  sample_id_key:
    type: str
    default: "sample_id"
    description: Optional sample identifier column in `adata.obs`.
  gene_id_type:
    type: str
    default: "gene_symbols"
    description: Declared gene identifier type for provider readiness checks. Expected values are `gene_symbols`, `ensembl`, or `auto`.
  expression_layer:
    type: str
    default: "X"
    description: Expression layer/view used by providers unless a provider config overrides it.
  provider_preset:
    type: str
    default: "default"
    description: Planned provider preset. `default` should remain conservative; experimental providers such as scGPT/scTab must require explicit configuration.
outputs:
  results_dir: {}
  dataset_profile:
    path: results/dataset_profile.json
  provider_index:
    path: results/provider_index.json
  provider_results:
    glob: results/providers/*/annotation_result.json
  provider_logs:
    glob: results/providers/*/logs/*
run:
  mode: render
  entry: run.sh
