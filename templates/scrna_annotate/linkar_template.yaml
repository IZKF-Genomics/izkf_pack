id: scrna_annotate
version: 0.1.0
description: Tiered scverse/Scanpy single-cell RNA-seq annotation workflow with quick preview, refinement, and formal annotation layers.
tools:
  required:
    - pixi
    - python3
params:
  workflow_config:
    type: path
    default: "config/workflow.yaml"
    description: Top-level workflow config file for the rebuilt tiered annotation template.
  input_h5ad:
    type: path
    default: ""
    description: Prepared `.h5ad` input used as the global workflow input. The rebuilt template expects this path in `config/workflow.yaml`.
  cluster_key:
    type: str
    default: "leiden"
    description: Cluster column used across all tiers of the rebuilt workflow.
  batch_key:
    type: str
    default: "batch"
    description: Optional batch column used in summaries and plots when available.
  condition_key:
    type: str
    default: "condition"
    description: Optional condition column used in summaries and plots when available.
  sample_id_key:
    type: str
    default: "sample_id"
    description: Optional sample identifier column used in summaries and plots.
  sample_label_key:
    type: str
    default: "sample_display"
    description: Optional sample display column used in hover labels and tables.
  unknown_label:
    type: str
    default: "Unknown"
    description: Label used for unresolved cells or clusters across all tiers.
outputs:
  workflow_config_file:
    path: config/workflow.yaml
  workflow_reports:
    glob: reports/*.html
  tier1_adata:
    path: tier1_quick_preview/results/adata.preview.h5ad
  tier2_adata:
    path: tier2_refinement/results/adata.refined.h5ad
  tier3_adata:
    path: tier3_formal_annotation/results/adata.annotated.h5ad
  tier1_reports:
    glob: tier1_quick_preview/reports/*.html
  tier2_reports:
    glob: tier2_refinement/reports/*.html
  tier3_reports:
    glob: tier3_formal_annotation/reports/*.html
  tier1_tables:
    glob: tier1_quick_preview/results/tables/*.csv
  tier2_tables:
    glob: tier2_refinement/results/tables/*.csv
  tier3_tables:
    glob: tier3_formal_annotation/results/tables/*.csv
run:
  mode: render
  entry: run.sh
