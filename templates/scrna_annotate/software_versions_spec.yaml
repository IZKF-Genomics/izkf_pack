tools:
  - pixi
  - python

software:
  - name: scanpy
    command: pixi run python -c "import scanpy; print(scanpy.__version__)"
  - name: anndata
    command: pixi run python -c "import anndata; print(anndata.__version__)"

params:
  - name: organism
    env: ORGANISM
  - name: tissue
    env: TISSUE
  - name: cluster_key
    env: CLUSTER_KEY
  - name: provider_preset
    env: PROVIDER_PRESET
