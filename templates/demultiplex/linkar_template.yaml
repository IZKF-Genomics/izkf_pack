id: demultiplex
version: 0.2.2
description: Clone and run the upstream demultiplexing_prefect pipeline for Illumina or AVITI runs through Linkar.
tools:
  required:
    - git
    - pixi
  required_any:
    - [bcl-convert, bases2fastq]
params:
  bcl_dir:
    type: path
    required: true
    description: Raw run folder. For compatibility this legacy parameter is mapped to the upstream --input-dir flag for either Illumina or AVITI runs.
  platform:
    type: str
    default: illumina
    description: Demultiplexing platform. Use illumina for bcl-convert runs or aviti for bases2fastq runs.
  use_api_samplesheet:
    type: bool
    default: true
    description: When true and --samplesheet is not passed explicitly, resolve the Illumina samplesheet from the facility API via the default binding. For AVITI runs the binding prefers bcl_dir/RunManifest.csv.
  agendo_id:
    type: str
    default: ""
    description: Optional request id fallback used for API samplesheet lookup when the flowcell lookup returns 404.
  flowcell_id:
    type: str
    default: ""
    description: Optional flowcell id override used for Illumina API samplesheet lookup. If omitted, it is derived from bcl_dir.
  samplesheet:
    type: path
    description: Optional manifest passed to the upstream demultiplexer. Use an Illumina SampleSheet for platform=illumina or an AVITI RunManifest.csv for platform=aviti. With --binding default it resolves from the facility API for Illumina or from bcl_dir/RunManifest.csv for AVITI, then falls back to the bundled samplesheet.csv.
  qc_tool:
    type: str
    default: falco
    description: QC tool selection. Use fastqc, fastp, falco, or a comma-separated combination.
  contamination_tool:
    type: str
    default: none
    description: Optional contamination tool selection. Use none, kraken, kraken_bracken, fastq_screen, or a comma-separated combination.
  threads:
    type: int
    default: 4
    description: Global CPU thread budget for QC and contamination stages. In izkf_pack, the default binding resolves this to 80% of host CPUs via get_host_max_cpus.
  kraken_db:
    type: path
    default: ""
    description: Kraken2 database directory required for kraken, or shared with bracken when using kraken_bracken.
  bracken_db:
    type: path
    default: ""
    description: Bracken database directory. If omitted upstream falls back to kraken_db for kraken_bracken.
  fastq_screen_conf:
    type: path
    default: ""
    description: FastQ Screen configuration file.
# Output paths and globs are resolved relative to LINKAR_RESULTS_DIR,
# which defaults to <template_workspace>/results.
outputs:
  results_dir:
    path: results
  output_dir:
    path: results/output
  samples_tsv:
    path: results/samples.tsv
  software_versions:
    path: results/software_versions.json
  demux_fastq_files:
    glob: results/output/*/*.fastq.gz
  aviti_auxiliary_dir: {}
  project_qc_dirs:
    glob: results/output/*/qc
  fastqc_dir: {}
  fastqc_project_dirs:
    glob: results/output/*/qc/fastqc
  fastqc_reports:
    glob: results/output/*/qc/fastqc/*_fastqc.html
  fastp_dir: {}
  fastp_project_dirs:
    glob: results/output/*/qc/fastp
  fastp_html_reports:
    glob: results/output/*/qc/fastp/*.html
  fastp_json_reports:
    glob: results/output/*/qc/fastp/*.json
  fastp_passthrough_dir: {}
  fastp_passthrough_project_dirs:
    glob: results/output/*/qc/fastp_passthrough
  fastp_passthrough_fastq_files:
    glob: results/output/*/qc/fastp_passthrough/**/*.fastq.gz
  falco_dir: {}
  falco_project_dirs:
    glob: results/output/*/qc/falco
  falco_reports:
    glob: results/output/*/qc/falco/**/*.html
  contamination_dir: {}
  contamination_outputs:
    glob: results/contamination/**/*
  project_contamination_dirs:
    glob: results/output/*/qc/contamination
  project_contamination_outputs:
    glob: results/output/*/qc/contamination/**/*
  multiqc_dir: {}
  multiqc_report:
    path: results/multiqc/multiqc_report.html
  project_multiqc_reports:
    glob: results/output/*/qc/multiqc/multiqc_report.html
  project_adoption_metadata:
    glob: results/output/*/.linkar/meta.json
  project_template_outputs_json:
    glob: results/output/*/template_outputs.json
  template_outputs_json:
    path: results/template_outputs.json
  run_summary:
    glob: results/.pipeline/*/run_summary.json
cleanup:
  - path: .pixi
    type: dir
  - path: demultiplexing_prefect
    type: dir
run:
  mode: render
  entry: run.sh
