id: demultiplex
version: 0.2.0
description: Clone and run the upstream demultiplexing_prefect pipeline through Linkar.
tools:
  required:
    - git
    - pixi
  required_any:
    - [bcl-convert]
params:
  bcl_dir:
    type: path
    required: true
    description: BCL run folder for bcl-convert.
  use_api_samplesheet:
    type: bool
    default: true
    description: When true and --samplesheet is not passed explicitly, resolve samplesheet from the facility API via the default binding.
  agendo_id:
    type: str
    default: ""
    description: Optional request id fallback used for API samplesheet lookup when the flowcell lookup returns 404.
  flowcell_id:
    type: str
    default: ""
    description: Optional flowcell id override used for API samplesheet lookup. If omitted, it is derived from bcl_dir.
  samplesheet:
    type: path
    description: Optional sample sheet passed to bcl-convert. With --binding default it resolves from the facility API or falls back to the bundled samplesheet.csv.
  qc_tool:
    type: str
    default: falco
    description: QC tool selection. Use fastqc, fastp, falco, or a comma-separated combination.
  contamination_tool:
    type: str
    default: none
    description: Optional contamination tool selection. Use none, kraken, kraken_bracken, fastq_screen, or a comma-separated combination.
  threads:
    type: int
    default: 4
    description: Global CPU thread budget for QC and contamination stages. In izkf_pack, the default binding resolves this to 80% of host CPUs via get_host_max_cpus.
  kraken_db:
    type: path
    default: ""
    description: Kraken2 database directory required for kraken, or shared with bracken when using kraken_bracken.
  bracken_db:
    type: path
    default: ""
    description: Bracken database directory. If omitted upstream falls back to kraken_db for kraken_bracken.
  fastq_screen_conf:
    type: path
    default: ""
    description: FastQ Screen configuration file.
outputs:
  results_dir: {}
  output_dir: {}
  demux_fastq_files:
    glob: output/**/*.fastq.gz
  fastqc_dir: {}
  fastqc_reports:
    glob: fastqc/*_fastqc.html
  fastp_dir: {}
  fastp_html_reports:
    glob: fastp/*.html
  fastp_json_reports:
    glob: fastp/*.json
  fastp_passthrough_dir: {}
  fastp_passthrough_fastq_files:
    glob: fastp_passthrough/**/*.fastq.gz
  falco_dir: {}
  falco_reports:
    glob: falco/**/*.html
  contamination_dir: {}
  contamination_outputs:
    glob: contamination/**/*
  multiqc_dir: {}
  multiqc_report:
    path: multiqc/multiqc_report.html
  template_outputs_json:
    path: template_outputs.json
  run_summary:
    glob: .pipeline/*/run_summary.json
run:
  mode: render
  command: |
    upstream_repo_url="https://github.com/MoSafi2/demultiplexing_prefect"
    upstream_commit="08a77d8010bce28c26b3c71089256ed1ba6a145a"
    upstream_repo_dir="./demultiplexing_prefect"
    render_root="$(pwd)"
    results_dir="${render_root}/results"
    samplesheet_path="${param:samplesheet}"
    if [[ "${samplesheet_path}" != /* ]]; then
      samplesheet_path="${render_root}/${samplesheet_path#./}"
    fi

    rm -rf "${upstream_repo_dir}"
    git clone --depth 1 "${upstream_repo_url}" "${upstream_repo_dir}"
    git -C "${upstream_repo_dir}" checkout "${upstream_commit}"

    pushd "${upstream_repo_dir}" >/dev/null
    pixi run python -m demux_pipeline.cli \
      --outdir "${results_dir}" \
      --bcl_dir "${param:bcl_dir}" \
      --samplesheet "${samplesheet_path}" \
      --qc-tool "${param:qc_tool}" \
      --contamination-tool "${param:contamination_tool}" \
      --threads "${param:threads}" \
      --output-contract-file "${results_dir}/template_outputs.json" \
      ${param:kraken_db:+--kraken-db "${param:kraken_db}"} \
      ${param:bracken_db:+--bracken-db "${param:bracken_db}"} \
      ${param:fastq_screen_conf:+--fastq-screen-conf "${param:fastq_screen_conf}"}
    popd >/dev/null
    rm -rf .pixi
