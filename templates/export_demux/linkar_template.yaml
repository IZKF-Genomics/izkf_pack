id: export_demux
version: 0.1.0
description: Submit an export request for an ad hoc demultiplex run and store canonical export metadata under the source run directory.
tools:
  required:
    - python3
params:
  run_dir:
    type: path
    required: true
    description: Path to the ad hoc demultiplex run directory. Expected to contain output/ and multiqc/multiqc_report.html unless overrides are provided.
  project_name:
    type: str
    default: ""
    description: Project name recorded in the export request. Defaults to the basename of run_dir.
  fastq_dir:
    type: str
    default: ""
    description: Optional override for the FASTQ directory. Defaults to output_dir from .linkar/meta.json, then run_dir/output.
  multiqc_report:
    type: str
    default: ""
    description: Optional override for the MultiQC report path. Defaults to multiqc_report from .linkar/meta.json, then run_dir/multiqc/multiqc_report.html.
  export_engine_api_url:
    type: str
    default: http://genomics.rwth-aachen.de:9500/export
    description: Export engine base URL. If it does not end with /export, the suffix is appended automatically.
  export_engine_backends:
    type: str
    default: apache, owncloud, sftp
    description: Comma-separated export backends for the export job spec.
  export_expiry_days:
    type: int
    default: 30
    description: Optional expiry_days value for the export engine job spec.
  export_username:
    type: str
    default: ""
    description: Optional export username. Defaults to a value derived from project_name.
  export_password:
    type: str
    default: ""
    description: Optional export password/token. A random token is generated when omitted.
  include_in_report:
    type: bool
    default: true
    description: Default include-in-report behavior for export entries.
  include_in_report_fastq:
    type: bool
    default: true
    description: Override include_in_report for the FASTQ export entry.
  include_in_report_multiqc:
    type: bool
    default: true
    description: Override include_in_report for the MultiQC export entry.
  poll_interval_seconds:
    type: int
    default: 2
    description: Poll interval in seconds while waiting for the final export status.
  timeout_seconds:
    type: int
    default: 3600
    description: Timeout in seconds while waiting for the final export status.
  dry_run:
    type: bool
    default: false
    description: If true, build and save the export metadata but do not submit anything to the export engine.
outputs:
  results_dir: {}
  export_metadata_dir:
    path: export_metadata_dir.txt
  export_job_id:
    path: export_job_id.txt
run:
  mode: direct
  verbose_by_default: true
  command: |
    python3 ./run.py \
      --results-dir "${LINKAR_RESULTS_DIR}" \
      --run-dir "${param:run_dir}" \
      --project-name "${param:project_name}" \
      --fastq-dir "${param:fastq_dir}" \
      --multiqc-report "${param:multiqc_report}" \
      --export-engine-api-url "${param:export_engine_api_url}" \
      --export-engine-backends "${param:export_engine_backends}" \
      --export-expiry-days "${param:export_expiry_days}" \
      --export-username "${param:export_username}" \
      --export-password "${param:export_password}" \
      --include-in-report "${param:include_in_report}" \
      --include-in-report-fastq "${param:include_in_report_fastq}" \
      --include-in-report-multiqc "${param:include_in_report_multiqc}" \
      --poll-interval-seconds "${param:poll_interval_seconds}" \
      --timeout-seconds "${param:timeout_seconds}" \
      --dry-run "${param:dry_run}"
