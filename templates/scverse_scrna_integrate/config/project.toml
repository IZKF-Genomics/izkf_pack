[project]
name = "260421_scRNA_Integration"

[input]
input_h5ad = "/tmp/input.h5ad"
input_source_template = "scverse_scrna_prep"

[metadata]
batch_key = "batch"
condition_key = "condition"
sample_id_key = "sample_id"
sample_label_key = "sample_display"
label_key_for_metrics = "cell_type"

[integration]
integration_method = "scvi"
run_scib_metrics = true
use_hvgs_only = true
n_top_hvgs = 3000
n_pcs = 30
n_neighbors = 15
umap_min_dist = 0.5
cluster_resolution = 0.8
random_seed = 0
harmony_theta = 2.0
harmony_lambda = 1.0
harmony_max_iter = 20
bbknn_neighbors_within_batch = 3
bbknn_trim = 0
scanvi_label_key = ""
scanvi_unlabeled_category = "Unknown"
scvi_latent_dim = 30
scvi_max_epochs = 200
scvi_gene_likelihood = "zinb"
scvi_accelerator = "auto"
scvi_devices = 1

[output]
adata_file = "results/adata.integrated.h5ad"
integration_summary_file = "results/tables/integration_summary.csv"
integration_metrics_file = "results/tables/integration_metrics.csv"
batch_mixing_summary_file = "results/tables/batch_mixing_summary.csv"
cluster_counts_file = "results/tables/cluster_counts.csv"
