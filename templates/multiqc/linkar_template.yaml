id: multiqc
version: 0.1.0
description: Write placeholder MultiQC-style outputs under the Linkar results directory.
params:
  input_dir:
    type: path
    required: true
  title:
    type: str
    default: IZKF MultiQC Summary
outputs:
  results_dir: {}
  multiqc_dir: {}
  multiqc_summary:
    path: multiqc/summary.txt
  multiqc_report:
    path: multiqc/report.txt
run:
  entry: run.sh
  mode: direct
