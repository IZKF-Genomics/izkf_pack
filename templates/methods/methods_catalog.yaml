templates:
  cellranger_atac:
    category: analysis
    publication_relevance: true
    label: Single-cell ATAC-seq processing
    summary: Single-cell ATAC-seq libraries were processed with Cell Ranger ATAC and optionally aggregated across samples.
    method_core: Single-cell ATAC-seq libraries were processed with Cell Ranger ATAC using the configured reference package and local resource settings, with optional aggregation across libraries when requested.
    method_details:
      - Per-sample Cell Ranger ATAC analysis was performed from demultiplexed FASTQ files using the configured reference package for barcode processing, alignment, and peak-associated counting.
      - Count outputs were generated separately for each library rather than as a pooled multi-sample analysis.
      - If aggregation is recorded, it represents a downstream combination of successful per-sample outputs.
    important_params:
      - reference
      - run_aggr
    param_explanations:
      reference: Cell Ranger ATAC reference package used for alignment and quantification.
      run_aggr: Whether aggregated multi-library analysis was attempted after per-sample counting.
    param_context:
      - The reference package defines the genomic context.
      - Aggregation should be distinguished from the primary per-sample count runs.
    command_hints:
      - Use runtime_command to determine whether aggregation was run.
      - Use software_versions or runtime_command to report the Cell Ranger ATAC version.
    tools:
      - Cell Ranger ATAC
    citations:
      - cellranger_atac

  demultiplex:
    category: preprocessing
    publication_relevance: true
    label: Demultiplexing and sequencing quality control
    summary: Sequencing output was demultiplexed into sample-specific sequencing files and quality-control reports.
    method_core: Raw sequencing output was demultiplexed into sample-specific FASTQ files using a facility-managed demultiplexing pipeline based on Illumina BCL conversion, followed by aggregate quality-control reporting.
    method_details:
      - Base calls were converted into sample-specific FASTQ files according to the sequencing run sample sheet, establishing the sequencing inputs used for downstream analysis.
      - Per-sample FASTQ quality metrics were reviewed after demultiplexing, and aggregate quality-control summaries were compiled across the sequencing run.
      - Optional contamination or secondary screening modules represent post-demultiplexing technical quality control.
    important_params:
      - samplesheet
      - qc_tool
      - contamination_tool
    param_explanations:
      samplesheet: Sample sheet used for sample demultiplexing and lane/sample assignment.
      qc_tool: Quality-control tools selected for FASTQ summarization.
      contamination_tool: Optional contamination-screening tools applied after demultiplexing.
    param_context:
      - qc_tool and contamination_tool determine which technical QC outputs are produced.
    command_hints:
      - Use runtime_command and software_versions to recover the demultiplexing and QC tool combination.
      - Mention only optional QC modules that were actually enabled.
    tools:
      - BCL Convert
      - MultiQC
    citations:
      - bcl_convert
      - falco
      - multiqc

  dgea:
    category: downstream_analysis
    publication_relevance: true
    label: Differential gene expression analysis
    summary: Differential gene expression analysis was prepared in an editable reporting workspace using project-level count and sample metadata.
    method_core: Differential expression analysis and reporting were prepared in an editable analysis workspace built around project-level quantification outputs, sample metadata, and templated downstream statistical reporting.
    method_details:
      - This stage represents downstream statistical analysis rather than primary read processing.
      - Sample metadata were used to define biological groups and comparisons for downstream modeling and reporting.
      - Count or quantification summaries from upstream RNA-seq processing were organized for contrast definition, statistical testing, and reporting.
      - Differential expression modeling is DESeq2-based when that tool is listed among the recorded software or citations.
      - When functional interpretation is enabled in the reporting workspace, Gene Ontology enrichment and ranked-list GSEA are performed with clusterProfiler.
    important_params:
      - samplesheet
      - organism
      - spikein
      - application
      - name
    param_explanations:
      samplesheet: Sample metadata table used to define sample identity and groups for downstream modeling.
      organism: Organism setting used to shape annotation and downstream defaults.
      spikein: Spike-in context used to decide whether spike-in-aware filtering should be considered.
      application: Analysis application label used to choose downstream reporting defaults.
      name: Human-readable report or project name used in generated outputs.
    param_context:
      - samplesheet, organism, and application define the downstream analytical context.
    command_hints:
      - When runtime metadata are sparse, use the catalog description plus software_versions.
      - Describe this template as a downstream workspace rather than a single fixed command.
    tools:
      - R
      - Quarto
      - DESeq2
      - clusterProfiler
    citations:
      - deseq2
      - clusterprofiler
      - quarto

  ercc:
    category: quality_control
    publication_relevance: true
    label: ERCC spike-in quality control
    summary: ERCC spike-in behavior was reviewed in a dedicated reporting workspace using Salmon quantification outputs and sample metadata.
    method_core: ERCC spike-in performance was assessed in a dedicated quality-control workspace built from sample-level Salmon quantification outputs and accompanying sample metadata, with Quarto-rendered reporting of spike-in dynamic range and detection behavior across samples.
    method_details:
      - This stage represents assay quality control rather than primary biological analysis.
      - ERCC abundance estimates derived from the recorded Salmon quantification outputs were reviewed across libraries to assess spike-in detection behavior, dynamic range, and consistency.
      - When paired with 3' mRNA-seq processing, this report represents a downstream technical assessment of spike-in performance.
    important_params:
      - salmon_dir
      - samplesheet
      - authors
    param_explanations:
      salmon_dir: Quantification directory used as the source of ERCC abundance estimates.
      samplesheet: Sample metadata table used to associate quantification outputs with biological sample labels.
      authors: Recorded report authorship metadata for the generated QC workspace.
    param_context:
      - salmon_dir and samplesheet define the quantification outputs and sample identities included in the report.
    command_hints:
      - When runtime metadata are sparse, use the catalog description plus software_versions.
    tools:
      - Salmon
      - R
      - Quarto
    citations:
      - salmon
      - quarto
      - ercc_spikein

  methylation_array_analysis:
    category: downstream_analysis
    publication_relevance: true
    label: Methylation array analysis
    summary: Illumina methylation array data were assembled into an editable study workspace with preprocessing, quality control, differential methylation analysis, and Quarto reporting.
    method_core: Illumina methylation array data were analyzed in an editable R/Quarto study workspace that stages IDAT-based preprocessing, cohort curation, dimensionality reduction, differential methylation modeling, and report generation across one or more user-defined comparisons.
    method_details:
      - Raw Red and Green IDAT pairs were resolved from the registered datasets and validated before preprocessing to ensure that each included sample had complete array input files.
      - Signal import, detection p-value calculation, normalization, and extraction of beta values and M values were performed through minfi-based array preprocessing.
      - Normalization can include Noob, quantile normalization, SWAN, or functional normalization.
      - Probe-level filtering can incorporate detection performance, chromosome-based exclusions, and optional SNP or cross-reactive probe removal before downstream modeling.
      - When multiple datasets or batches are combined, probe matrices are merged on the shared feature space and can be batch-adjusted before downstream modeling.
      - Differential methylation testing is limma-based at the probe level, with optional region-level DMR calling through DMRcate and enrichment analysis through missMethyl.
    important_params:
      - authors
    param_explanations:
      authors: Optional author list shown in reports for the rendered study workspace.
    param_context:
      - Most analysis settings are defined in the rendered workspace configuration rather than as top-level parameters.
    command_hints:
      - When runtime metadata are sparse, use the catalog description plus recorded software versions.
      - Describe this template as an editable study workspace.
    tools:
      - minfi
      - limma
      - DMRcate
      - missMethyl
      - Quarto
    citations:
      - minfi
      - limma
      - dmrcate
      - missmethyl
      - quarto

  scrna_prep:
    category: downstream_analysis
    publication_relevance: true
    label: Single-cell RNA-seq preprocessing and quality control
    summary: Single-cell RNA-seq data were prepared in an editable Scanpy/scverse workspace that supports H5AD or matrix-style inputs, sample-aware quality control, dimensionality reduction, clustering, and Quarto reporting.
    method_core: Single-cell RNA-seq data were processed in an editable Scanpy/scverse preprocessing workspace that imports exactly one H5AD or matrix-style input, optionally joins sample metadata, computes cell-level quality-control metrics, applies configurable filtering, performs graph-based embedding and clustering, and renders a Quarto QC report.
    method_details:
      - Input data can be imported from H5AD objects, 10x Genomics HDF5 or MTX outputs, Parse Biosciences matrices, ScaleBio or STARsolo-style matrices, or Cell Ranger per-sample outputs, with exactly one primary input path used per run.
      - Optional sample metadata can be joined by sample identifier to add batch, condition, and display labels for sample-aware summaries, while runs without external metadata still proceed with internally derived sample labels when possible.
      - Cell-level quality-control metrics include library size, detected genes, and organism-aware mitochondrial, ribosomal, and hemoglobin transcript fractions.
      - Filtering can be applied through fixed thresholds or per-sample median absolute deviation rules, allowing sample-aware exclusion of low-quality outlier cells.
      - When enabled, doublet scoring is performed with Scrublet and predicted doublets can be retained for review or removed from the filtered analysis object.
      - The retained object is normalized, highly variable genes are identified, and principal component analysis, nearest-neighbor graph construction, UMAP embedding, and Leiden clustering are performed within the same Scanpy workflow.
      - Quality-control summaries, clustering diagnostics, and final embedding views are rendered in the Quarto report alongside the prepared AnnData object.
      - Resolution benchmarking can be used to review clustering structure across multiple Leiden resolutions.
    important_params:
      - input_format
      - organism
      - doublet_method
      - filter_predicted_doublets
      - qc_mode
      - qc_nmads
      - min_genes
      - min_cells
      - min_counts
      - max_pct_counts_mt
      - max_pct_counts_ribo
      - max_pct_counts_hb
      - n_top_hvgs
      - n_pcs
      - n_neighbors
      - leiden_resolution
      - resolution_grid
    param_explanations:
      input_format: Input format used to interpret the upstream single-cell expression matrix or H5AD object.
      organism: Organism label used to define mitochondrial, ribosomal, and hemoglobin gene-pattern QC rules.
      doublet_method: Doublet detection method applied during QC.
      filter_predicted_doublets: Whether predicted doublets were removed from the filtered analysis object.
      qc_mode: Strategy used for cell-level QC thresholding.
      qc_nmads: Number of MADs used for outlier-based filtering when MAD mode is selected.
      min_genes: Minimum genes detected per cell.
      min_cells: Minimum cells expressing a gene.
      min_counts: Minimum counts per cell.
      max_pct_counts_mt: Maximum mitochondrial transcript fraction allowed during filtering.
      max_pct_counts_ribo: Optional maximum ribosomal transcript fraction allowed during filtering.
      max_pct_counts_hb: Optional maximum hemoglobin transcript fraction allowed during filtering.
      n_top_hvgs: Number of highly variable genes used for downstream dimensionality reduction.
      n_pcs: Number of principal components used for graph construction and embedding.
      n_neighbors: Number of neighbors used to build the cell-cell graph.
      leiden_resolution: Final Leiden clustering resolution when specified explicitly.
      resolution_grid: Set of Leiden resolutions benchmarked during clustering diagnostics.
    param_context:
      - QC thresholds, doublet handling, and graph parameters influence the retained cell set and exploratory structure.
    command_hints:
      - When runtime metadata are sparse, use the catalog description plus recorded software versions.
      - Cite Scrublet only when doublet detection was enabled for the recorded run.
    tools:
      - Scanpy
      - scverse
      - Scrublet
      - Python
      - Quarto
    citations:
      - scanpy
      - umap
      - leiden
      - quarto

  scrna_integrate:
    category: downstream_analysis
    publication_relevance: true
    label: Single-cell RNA-seq dataset integration
    summary: Multiple single-cell RNA-seq datasets were integrated in an editable Scanpy/scverse workspace with explicit unintegrated baseline review, batch-aware latent modeling or graph correction, and quantitative integration diagnostics.
    method_core: Multiple single-cell RNA-seq datasets were integrated in an editable Scanpy/scverse workspace that validates the batch variable, preserves an unintegrated baseline embedding, performs one configured integration backend, rebuilds graph-based embeddings and clustering from the integrated representation, and renders a Quarto QC report with quantitative diagnostics.
    method_details:
      - The workspace consumes a prepared AnnData object, checks that the configured batch column contains at least two real categories, and fails early rather than fabricating placeholder metadata.
      - An unintegrated baseline PCA, nearest-neighbor graph, UMAP embedding, and Leiden clustering are computed before correction so the apparent batch structure can be reviewed directly.
      - Integration can be performed with scVI, scANVI, Harmony, BBKNN, or Scanorama, with method-specific validation and parameter recording in the runtime metadata.
      - For scVI and scANVI, the workspace requires raw UMI counts in `adata.layers["counts"]` and rebuilds the downstream graph from the learned latent representation.
      - For Harmony, BBKNN, and Scanorama, dimensionality reduction and graph reconstruction are performed without dense centering of sparse matrices.
      - Quantitative diagnostics include neighborhood batch-mixing summaries, graph-connectivity assessment when labels are available, and optional scIB metrics when the package is installed and the required labels are present.
      - The integrated AnnData object, integration metric tables, and the rendered Quarto report are written as explicit outputs for downstream export and review.
    important_params:
      - integration_method
      - batch_key
      - label_key_for_metrics
      - run_scib_metrics
      - use_hvgs_only
      - n_top_hvgs
      - n_pcs
      - n_neighbors
      - umap_min_dist
      - cluster_resolution
      - scanvi_label_key
      - scanvi_unlabeled_category
      - scvi_latent_dim
      - scvi_max_epochs
      - scvi_gene_likelihood
    param_explanations:
      integration_method: Integration backend used to construct the corrected representation.
      batch_key: Obs column defining the batches or datasets to integrate.
      label_key_for_metrics: Optional label column used for biological-conservation diagnostics.
      run_scib_metrics: Whether optional scIB metrics were attempted in addition to the native diagnostics.
      use_hvgs_only: Whether integration was restricted to highly variable genes.
      n_top_hvgs: Number of highly variable genes used when they were recomputed.
      n_pcs: Number of principal components used for classical integration methods and the unintegrated baseline.
      n_neighbors: Number of neighbors used for graph construction and batch-mixing summaries.
      umap_min_dist: UMAP minimum-distance parameter used for baseline and integrated embeddings.
      cluster_resolution: Leiden resolution used for baseline and integrated clustering.
      scanvi_label_key: Label column supplied to scANVI when semi-supervised integration was used.
      scanvi_unlabeled_category: Label value treated as unlabeled by scANVI.
      scvi_latent_dim: Latent dimensionality used by scVI or scANVI.
      scvi_max_epochs: Maximum training epochs used by scVI or scANVI.
      scvi_gene_likelihood: Gene-likelihood family used by scVI or scANVI.
    param_context:
      - The batch variable and integration backend determine whether the run behaves like simple correction or full cross-dataset integration.
      - Label-aware diagnostics are only available when biologically meaningful labels are present in the prepared object.
    command_hints:
      - When runtime metadata are sparse, prefer the recorded `integration_method`, `batch_key`, and metrics-table outputs over generic wording.
      - Cite the specific integration backend used for the recorded run rather than listing all supported methods.
      - Cite scIB only when `run_scib_metrics` was enabled for the recorded run.
    tools:
      - Scanpy
      - scverse
      - scVI
      - scANVI
      - Harmony
      - BBKNN
      - Scanorama
      - Quarto
    citations:
      - scanpy
      - umap
      - leiden
      - quarto

  scrna_annotate:
    category: downstream_analysis
    publication_relevance: true
    label: Single-cell RNA-seq cell type annotation
    summary: Single-cell RNA-seq profiles were annotated in an editable Scanpy/scverse workspace using CellTypist label transfer, cluster-level review, and optional marker-based validation.
    method_core: Single-cell RNA-seq profiles were annotated in an editable Scanpy/scverse workspace that applies CellTypist-based label transfer, summarizes predictions by cluster, optionally scores user-provided marker sets for review, and records a conservative final label column for unresolved clusters.
    method_details:
      - The workspace consumes a prepared or integrated AnnData object together with an existing clustering result and preserves the distinction between per-cell predicted labels, cluster-level suggested labels, and final accepted labels.
      - CellTypist predictions are generated from a log-normalized expression view of the data using a user-specified built-in or custom reference model.
      - Prediction confidence is recorded for each cell and is aggregated at the cluster level together with the dominant predicted label fraction.
      - Cluster-level labels are only accepted automatically when the dominant prediction frequency and the mean confidence exceed the configured review thresholds; otherwise the cluster remains unresolved for manual inspection.
      - Optional marker sets can be supplied to score candidate labels across clusters as an additional review layer rather than as a silent override of the classifier output.
      - The annotated AnnData object, cluster review tables, and Quarto report are written as explicit outputs for downstream interpretation and export.
    important_params:
      - annotation_method
      - celltypist_model
      - celltypist_mode
      - celltypist_p_thres
      - cluster_key
      - majority_vote_min_fraction
      - confidence_threshold
      - unknown_label
      - predicted_label_key
      - final_label_key
      - marker_file
    param_explanations:
      annotation_method: Annotation backend used to generate the initial cell identity predictions.
      celltypist_model: Built-in or custom CellTypist reference model used for label transfer.
      celltypist_mode: CellTypist prediction mode controlling whether best-match or probability-threshold labeling was used.
      celltypist_p_thres: Probability threshold used when CellTypist probability-matching mode was selected.
      cluster_key: Cluster column used for annotation review and cluster-level label consolidation.
      majority_vote_min_fraction: Minimum fraction of cells within a cluster required before the dominant predicted label is accepted automatically.
      confidence_threshold: Minimum mean classifier confidence required before a cluster-level label is accepted automatically.
      unknown_label: Label used for unresolved or review-required cells.
      predicted_label_key: Observation column containing the raw classifier predictions.
      final_label_key: Observation column containing the final accepted annotation after review rules.
      marker_file: Optional marker-set file used for marker-based review summaries.
    param_context:
      - Automated annotation quality depends strongly on how well the reference model matches the query data and how informative the upstream clustering is.
      - Marker-based review is intended as a validation layer rather than as a substitute for a relevant reference model.
    command_hints:
      - When runtime metadata are sparse, prefer the recorded CellTypist model name, cluster key, and review-threshold parameters over generic annotation wording.
      - Cite CellTypist when annotation_method was `celltypist`.
    tools:
      - Scanpy
      - scverse
      - CellTypist
      - Quarto
    citations:
      - scanpy
      - quarto

  nfcore_3mrnaseq:
    category: analysis
    publication_relevance: true
    label: 3' mRNA-seq processing
    summary: Transcriptome sequencing data were processed with the nf-core/rnaseq workflow using the configured genome and quantification settings.
    method_core: 3' mRNA-seq libraries were processed with the nf-core/rnaseq workflow under a facility-specific configuration using Nextflow and containerized execution, with alignment, quantification, and QC coordinated under a pinned workflow revision.
    method_details:
      - The workflow represents a facility-specific 3' mRNA-seq implementation of nf-core/rnaseq executed through Nextflow in a reproducible containerized environment.
      - Within the workflow, reads were processed with STAR for alignment and Salmon for transcript quantification under the recorded nf-core/rnaseq revision.
      - Gene-level summaries and workflow quality-control outputs were generated within the same nf-core/rnaseq execution context.
      - For 3' mRNA-seq libraries, transcript quantification settings reflect assay-appropriate handling rather than generic full-length RNA-seq assumptions.
      - When ERCC spike-ins are present, the effective reference includes the spike-in-augmented genome rather than only the original genome label.
      - When UMI handling is enabled, the workflow includes UMI-aware extraction rather than generic RNA-seq processing alone.
      - Sample-specific FASTQ structure is inherited from upstream demultiplexing outputs and translated into the nf-core/rnaseq input table used for this analysis.
    important_params:
      - genome
      - samplesheet
      - umi
      - spikein
    param_explanations:
      genome: Selected facility genome identifier used to choose the reference bundle.
      samplesheet: nf-core/rnaseq input samplesheet describing sample-level FASTQ pairing and strandedness.
      umi: UMI kit description used to enable or disable UMI-aware extraction.
      spikein: Spike-in description that may alter the effective reference choice.
    param_context:
      - genome, spikein, and umi jointly shape the biological interpretation of the workflow.
    command_hints:
      - Use runtime_command to recover the workflow revision, execution profile, and UMI-specific flags.
      - Distinguish the requested genome from the effective genome after ERCC augmentation.
    tools:
      - Nextflow
      - nf-core/rnaseq
      - STAR
      - Salmon
    citations:
      - nextflow
      - nfcore_framework
      - nfcore_rnaseq
      - star
      - salmon

  nfcore_methylseq:
    category: analysis
    publication_relevance: true
    label: RRBS methylation-seq processing
    summary: RRBS sequencing data were processed with the nf-core/methylseq workflow using a facility-specific configuration and project-specific genome selection.
    method_core: RRBS libraries were processed with nf-core/methylseq under a pinned workflow revision using Nextflow and containerized execution, with facility-managed reference configuration and project-specific genome selection.
    method_details:
      - RRBS is the default protocol mode for this template.
      - The workflow represents a reproducible Nextflow execution of nf-core/methylseq under a pinned pipeline revision.
      - Demultiplexed FASTQ files are translated into the nf-core/methylseq input table, while the selected genome is passed explicitly through the recorded runtime configuration.
      - RRBS-aware methylation analysis should be described within the nf-core/methylseq execution context.
    important_params:
      - genome
      - rrbs
    param_explanations:
      genome: Selected facility genome identifier used to choose the reference FASTA.
      rrbs: RRBS mode flag for nf-core/methylseq.
    param_context:
      - genome and rrbs are the main run-specific scientific settings.
    command_hints:
      - Use runtime_command to recover the workflow revision, execution profile, and RRBS mode.
    tools:
      - Nextflow
      - nf-core/methylseq
      - Bismark
    citations:
      - nextflow
      - nfcore_framework
      - nfcore_methylseq
      - bismark

