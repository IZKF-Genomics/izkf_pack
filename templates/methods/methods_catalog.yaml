templates:
  cellranger_atac:
    category: analysis
    publication_relevance: true
    label: Single-cell ATAC-seq processing
    summary: Single-cell ATAC-seq libraries were processed with Cell Ranger ATAC and optionally aggregated across samples.
    method_core: Single-cell ATAC-seq libraries were processed with Cell Ranger ATAC using the configured reference package and local resource settings, with optional aggregation across libraries when requested.
    method_details:
      - Count-level processing should be described as per-sample Cell Ranger ATAC analysis of compatible FASTQ inputs.
      - If aggregation is recorded, describe it as a project-level aggregation step that combines successful per-sample outputs.
    important_params:
      - reference
      - run_aggr
    param_explanations:
      reference: Cell Ranger ATAC reference package used for alignment and quantification.
      run_aggr: Whether aggregated multi-library analysis was attempted after per-sample counting.
    param_context:
      - If run_aggr is true, the final methods text should distinguish per-sample count runs from downstream aggregation.
      - The reference parameter materially affects genome interpretation and should be considered part of the scientific context.
    command_hints:
      - Use runtime_command to recover whether only count was run or whether aggr was also invoked.
      - Prefer software_versions and runtime_command over generic tool assumptions when reporting the Cell Ranger ATAC version.
    tools:
      - Cell Ranger ATAC
    citations:
      - cellranger_atac

  demultiplex:
    category: preprocessing
    publication_relevance: true
    label: Demultiplexing and sequencing quality control
    summary: Sequencing output was demultiplexed into sample-specific sequencing files and quality-control reports.
    method_core: Raw sequencing output was demultiplexed into sample-specific FASTQ files using a facility-managed demultiplexing pipeline based on Illumina BCL conversion, followed by aggregate quality-control reporting.
    method_details:
      - This preprocessing step establishes the sample-specific sequencing files used by downstream analytical templates.
      - When contamination or secondary QC modules are present, describe them as post-demultiplexing QC and screening rather than as primary biological analysis.
    important_params:
      - samplesheet
      - qc_tool
      - contamination_tool
    param_explanations:
      samplesheet: Sample sheet used for sample demultiplexing and lane/sample assignment.
      qc_tool: Quality-control tools selected for FASTQ summarization.
      contamination_tool: Optional contamination-screening tools applied after demultiplexing.
    param_context:
      - qc_tool and contamination_tool materially affect which post-demultiplex QC outputs exist and should be considered when describing FASTQ quality review.
      - The methods text should focus on demultiplexing and QC behavior rather than instrument-local file paths or hardware allocation.
    command_hints:
      - Use runtime_command and software_versions to recover the actual demultiplexing and QC tool combination instead of assuming defaults.
      - When the runtime command indicates only a subset of optional QC modules was enabled, the methods text should mention only those modules.
    tools:
      - BCL Convert
      - MultiQC
    citations:
      - bcl_convert
      - multiqc

  dgea:
    category: downstream_analysis
    publication_relevance: true
    label: Differential gene expression analysis
    summary: Differential gene expression analysis was prepared in an editable reporting workspace using project-level count and sample metadata.
    method_core: Differential expression analysis and reporting were prepared in an editable analysis workspace built around project-level quantification outputs, sample metadata, and templated downstream statistical reporting.
    method_details:
      - This template should be described as downstream statistical analysis rather than primary read processing.
      - If the run captures a Quarto- or notebook-based workspace, mention that the analysis environment remained editable for project-specific refinement.
    important_params:
      - samplesheet
      - organism
      - spikein
      - application
      - name
    param_explanations:
      samplesheet: Sample metadata table used to define sample identity and groups for downstream modeling.
      organism: Organism setting used to shape annotation and downstream defaults.
      spikein: Spike-in context used to decide whether spike-in-aware filtering should be considered.
      application: Analysis application label used to choose downstream reporting defaults.
      name: Human-readable report or project name used in generated outputs.
    param_context:
      - samplesheet, organism, and application jointly define the downstream analytical context for the generated reporting workspace.
      - application and organism influence how the reporting workspace is configured and should be retained for LLM reasoning even if not explicitly printed in final prose.
    command_hints:
      - When runtime metadata are sparse, prefer the catalog description plus software_versions to explain this downstream analysis stage.
      - This template often represents a project-editable workspace rather than a single immutable command-line analysis.
    tools:
      - R
      - Quarto
      - DESeq2
    citations:
      - deseq2
      - quarto

  ercc:
    category: quality_control
    publication_relevance: true
    label: ERCC spike-in quality control
    summary: ERCC spike-in behavior was reviewed in a dedicated reporting workspace using Salmon quantification outputs and sample metadata.
    method_core: ERCC spike-in performance was assessed in a dedicated quality-control workspace built from sample-level Salmon quantification outputs and accompanying sample metadata, with Quarto-rendered reporting of spike-in dynamic range and detection behavior across samples.
    method_details:
      - This template should be described as assay quality control rather than as primary biological analysis.
      - When the template is paired with 3' mRNA-seq processing, it should be interpreted as a downstream review of ERCC spike-in consistency across the processed libraries.
    important_params:
      - salmon_dir
      - samplesheet
      - authors
    param_explanations:
      salmon_dir: Quantification directory used as the source of ERCC abundance estimates.
      samplesheet: Sample metadata table used to associate quantification outputs with biological sample labels.
      authors: Recorded report authorship metadata for the generated QC workspace.
    param_context:
      - salmon_dir and samplesheet jointly define which quantification outputs and sample identities are included in the ERCC quality-control report.
      - The methods text should emphasize spike-in assessment and reporting rather than restating the upstream alignment and quantification workflow in full.
    command_hints:
      - When runtime metadata are sparse, prefer the catalog description plus software_versions to explain this QC stage.
      - If the report is rendered through Quarto, describe it as a project-level QC report generated from recorded quantification results.
    tools:
      - Salmon
      - R
      - Quarto
    citations:
      - salmon
      - quarto
      - ercc_spikein

  nfcore_3mrnaseq:
    category: analysis
    publication_relevance: true
    label: 3' mRNA-seq processing
    summary: Transcriptome sequencing data were processed with the nf-core/rnaseq workflow using the configured genome and quantification settings.
    method_core: 3' mRNA-seq libraries were processed with the nf-core/rnaseq workflow under a facility-specific configuration using Nextflow and containerized execution, with alignment, quantification, and QC coordinated under a pinned workflow revision.
    method_details:
      - The methods text should emphasize that this is a facility-specific wrapper around nf-core/rnaseq for 3' mRNA-seq.
      - When ERCC spike-ins are present, the effective genome context should mention the spike-in-augmented reference rather than only the original genome label.
      - When UMI handling is enabled, the final methods text should reflect UMI-aware extraction rather than describing a generic RNA-seq workflow.
    important_params:
      - genome
      - samplesheet
      - umi
      - spikein
    param_explanations:
      genome: Selected facility genome identifier used to choose the reference bundle.
      samplesheet: nf-core/rnaseq input samplesheet describing sample-level FASTQ pairing and strandedness.
      umi: UMI kit description used to enable or disable UMI-aware extraction.
      spikein: Spike-in description that may alter the effective reference choice.
    param_context:
      - genome, spikein, and umi jointly shape the biological interpretation of the processing workflow and should be considered together.
      - samplesheet is operationally important and should influence LLM reasoning about sample structure even if it is not quoted verbatim in manuscript prose.
      - Hardware resource limits and report-labeling parameters should generally not dominate the scientific narrative.
    command_hints:
      - Use runtime_command to recover the actual nf-core/rnaseq revision, execution profile, and UMI-specific flags.
      - Use runtime metadata to distinguish the requested genome from the effective genome after ERCC augmentation.
      - Prefer runtime_command and software_versions over generic template summaries when the command captures richer tool context.
    tools:
      - Nextflow
      - nf-core/rnaseq
      - STAR
      - Salmon
    citations:
      - nextflow
      - nfcore_framework
      - nfcore_rnaseq
      - star
      - salmon

  nfcore_methylseq:
    category: analysis
    publication_relevance: true
    label: RRBS methylation-seq processing
    summary: RRBS sequencing data were processed with the nf-core/methylseq workflow using a facility-specific configuration and project-specific genome selection.
    method_core: RRBS libraries were processed with nf-core/methylseq under a pinned workflow revision using Nextflow and containerized execution, with facility-managed reference configuration and project-specific genome selection.
    method_details:
      - RRBS should be named explicitly because it is the default protocol mode for this template.
      - When runtime metadata are available, use the recorded command and generated Nextflow config to recover the actual execution context rather than inferring defaults.
      - If shared FASTA-based references were used to generate downstream indices at runtime, the text should reflect that facility reference handling without overclaiming prebuilt indices.
    important_params:
      - genome
      - rrbs
    param_explanations:
      genome: Selected facility genome identifier used to choose the reference FASTA.
      rrbs: RRBS mode flag for nf-core/methylseq.
    param_context:
      - genome and rrbs are the most important run-specific scientific settings for this template and should be considered explicitly by the LLM.
      - Report-labeling and hardware resource settings are secondary provenance context and should not dominate the scientific description.
    command_hints:
      - Use the runtime command to recover the exact nf-core/methylseq revision, execution profile, and whether RRBS mode was enabled.
      - Prefer runtime_command and software_versions over generic template summaries when reporting tool and workflow versions.
    tools:
      - Nextflow
      - nf-core/methylseq
      - Bismark
    citations:
      - nextflow
      - nfcore_framework
      - nfcore_methylseq
      - bismark

