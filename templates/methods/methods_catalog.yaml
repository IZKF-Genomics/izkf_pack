templates:
  demultiplex:
    label: Demultiplexing and sequencing quality control
    summary: Sequencing output was demultiplexed into sample-specific sequencing files and quality-control reports.
    method_core: Sequencing output was converted from run-folder data into sample-specific FASTQ files and summarized with standard quality-control reporting.
    method_details:
      - The demultiplexing step should be described as the preprocessing stage that establishes the sample-specific sequencing files used by downstream analyses.
      - When quality-control reporting is present, the narrative should mention aggregate QC review rather than only listing tool names.
    important_params:
      - bcl_dir
      - samplesheet
      - qc_tool
      - contamination_tool
      - threads
    param_explanations:
      qc_tool: Selected quality-control tools used to summarize FASTQ quality.
      contamination_tool: Optional contamination-screening tools applied after demultiplexing.
      threads: CPU budget used for demultiplexing-related QC and contamination checks.
    command_hints:
      - If a runtime command is present, use it to recover the actual demultiplexing and QC tool combination instead of assuming defaults.
    tools:
      - bcl-convert
      - MultiQC
    citations:
      - bcl_convert
      - multiqc

  nfcore_3mrnaseq:
    label: 3' mRNA-seq processing
    summary: Transcriptome sequencing data were processed with the nf-core/rnaseq workflow using the configured genome and quantification settings.
    method_core: 3' mRNA-seq libraries were processed with the nf-core/rnaseq workflow under a facility-specific configuration using Nextflow and containerized execution.
    method_details:
      - The description should emphasize that the workflow integrates alignment, quantification, and QC under a pinned nf-core pipeline revision.
      - When ERCC spike-ins are present, the effective genome context should mention the spike-in-augmented reference rather than only the original genome label.
    important_params:
      - genome
      - samplesheet
      - umi
      - spikein
      - project_name
      - max_cpus
      - max_memory
    param_explanations:
      genome: Selected facility genome identifier used to choose the reference bundle.
      umi: UMI kit description used to enable or disable UMI-aware extraction.
      spikein: Spike-in description that may alter the effective reference choice.
      project_name: MultiQC title and project-level label used in rendered reports.
      max_cpus: CPU cap applied through the generated runtime Nextflow config.
      max_memory: Memory cap applied through the generated runtime Nextflow config.
    command_hints:
      - Use the runtime command to recover the actual nf-core/rnaseq revision, execution profile, and any UMI-specific flags that were enabled.
      - Use runtime metadata to distinguish the requested genome from the effective genome used after ERCC augmentation.
    tools:
      - Nextflow
      - nf-core/rnaseq
      - STAR
      - Salmon
    citations:
      - nextflow
      - nfcore_framework
      - nfcore_rnaseq
      - star
      - salmon

  nfcore_methylseq:
    label: RRBS methylation-seq processing
    summary: RRBS sequencing data were processed with the nf-core/methylseq workflow using a facility-specific configuration and project-specific genome selection.
    method_core: RRBS libraries were processed with nf-core/methylseq under a pinned workflow revision using Nextflow and containerized execution.
    method_details:
      - The narrative should mention RRBS explicitly because it is the default protocol mode for this template.
      - When runtime metadata are available, use the recorded command and generated Nextflow config to recover the actual execution context rather than inferring defaults.
    important_params:
      - genome
      - rrbs
      - project_name
      - max_cpus
      - max_memory
    param_explanations:
      genome: Selected facility genome identifier used to choose the reference FASTA.
      rrbs: RRBS mode flag for nf-core/methylseq.
      project_name: MultiQC title and project-level label used in rendered reports.
      max_cpus: CPU cap applied through the generated runtime Nextflow config.
      max_memory: Memory cap applied through the generated runtime Nextflow config.
    command_hints:
      - Use the runtime command to recover the exact nf-core/methylseq revision, execution profile, and whether RRBS mode was enabled.
      - Prefer runtime_command and software_versions over generic template summaries when reporting tool and workflow versions.
    tools:
      - Nextflow
      - nf-core/methylseq
      - Bismark
    citations:
      - nextflow
      - nfcore_framework
      - nfcore_methylseq
      - bismark

  cellranger_atac:
    label: Single-cell ATAC-seq processing
    summary: Single-cell ATAC-seq libraries were processed with Cell Ranger ATAC and optionally aggregated across samples.
    method_core: Single-cell ATAC-seq libraries were processed with Cell Ranger ATAC using the configured reference and local resource settings.
    method_details:
      - If the recorded parameters include aggregation, describe it as a project-level aggregation step instead of implying per-sample processing only.
    important_params:
      - fastq_dir
      - reference
      - cellranger_atac_bin
      - run_aggr
      - localcores
      - localmem
    param_explanations:
      reference: Reference package used by Cell Ranger ATAC.
      run_aggr: Whether the run included Cell Ranger ATAC aggregation.
      localcores: CPU allocation passed to Cell Ranger ATAC.
      localmem: Memory allocation passed to Cell Ranger ATAC.
    command_hints:
      - If runtime metadata are available, prefer the recorded command and version output over generic tool descriptions.
    tools:
      - Cell Ranger ATAC
    citations:
      - cellranger_atac

  dgea:
    label: Differential gene expression analysis
    summary: Differential gene expression analysis was prepared in an editable reporting workspace using project-level count and sample metadata.
    method_core: Differential expression analysis and downstream reporting were prepared in an editable analysis workspace built around project-level count matrices and sample metadata.
    method_details:
      - This step should be described as downstream statistical analysis rather than primary sequence processing.
      - If the project uses a templated notebook or reporting workspace, mention that the run captures an editable analysis environment.
    important_params:
      - salmon_dir
      - samplesheet
      - organism
      - spikein
      - application
      - name
      - authors
    param_explanations:
      organism: Organism setting used to shape downstream analysis defaults.
      application: Analysis application context used to select the reporting template.
      name: Human-readable analysis or report name.
      authors: Recorded authorship metadata used in the generated analysis workspace.
    command_hints:
      - When runtime metadata are sparse, prefer the catalog summary and software versions to describe this step.
    tools:
      - R
      - Quarto
      - DESeq2
    citations:
      - deseq2
      - quarto

