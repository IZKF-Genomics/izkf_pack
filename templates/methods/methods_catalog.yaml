templates:
  archive_fastq:
    category: operational
    publication_relevance: false
    label: FASTQ archive maintenance
    summary: FASTQ run directories were synchronized to the facility archive root and recorded in a manifest log.
    method_core: This template is an operational data-retention step that copies FASTQ run folders into the facility archive tree and verifies the archived copy.
    method_details:
      - This step is administrative rather than analytical and should generally be omitted from publication methods text.
      - When mentioned, describe it as facility-side archiving or long-term storage rather than as biological data processing.
    important_params:
      - source_root
      - target_root
      - retention_days
      - cleanup
      - exclude_patterns
    param_explanations:
      source_root: FASTQ source root scanned for candidate runs.
      target_root: Archive destination root receiving copied FASTQ runs.
      retention_days: Minimum run age before a folder becomes eligible for archiving.
      cleanup: Whether the source directory is removed after verified archival.
      exclude_patterns: Rsync exclusion rules used during archival.
    param_context:
      - These parameters affect storage behavior and retention policy, not assay interpretation.
    command_hints:
      - Runtime commands primarily document rsync-based archival and should not be treated as scientific analysis steps.
    tools:
      - rsync
    citations: []

  archive_projects:
    category: operational
    publication_relevance: false
    label: Project archive maintenance
    summary: Project directories were synchronized to the facility archive root and recorded in a manifest log.
    method_core: This template is an operational data-retention step for archived project workspaces and associated analysis materials.
    method_details:
      - This step is administrative and should generally be excluded from manuscript-ready methods text.
    important_params:
      - source_root
      - target_root
      - retention_days
      - cleanup
      - exclude_patterns
    param_explanations:
      source_root: Project source root scanned for candidate project folders.
      target_root: Archive destination root receiving copied projects.
      retention_days: Minimum project age before archival is attempted.
      cleanup: Whether source folders are removed after verified archival.
      exclude_patterns: Rsync exclusion rules applied during archival.
    param_context:
      - These parameters describe retention and storage policy rather than biological or computational methodology.
    command_hints:
      - Treat this as project-maintenance provenance rather than publishable analytical methodology.
    tools:
      - rsync
    citations: []

  archive_raw:
    category: operational
    publication_relevance: false
    label: Raw run archive maintenance
    summary: Raw sequencing run directories were synchronized to the facility archive root and recorded in a manifest log.
    method_core: This template archives raw sequencing run folders to long-term storage and records the archive manifest for auditability.
    method_details:
      - This step reflects facility retention practice and should normally stay out of publication methods text.
      - If discussed, frame it as operational stewardship of raw sequencing data.
    important_params:
      - source_root
      - target_root
      - instrument_folders
      - retention_days
      - cleanup
    param_explanations:
      instrument_folders: Instrument subdirectories scanned for candidate raw runs.
      retention_days: Minimum run age before archival is attempted.
      cleanup: Whether source folders are removed after verified archival.
    param_context:
      - These settings affect archival policy and source selection, not downstream analysis.
    command_hints:
      - Runtime commands capture rsync and manifest generation behavior only.
    tools:
      - rsync
    citations: []

  cellranger_atac:
    category: analysis
    publication_relevance: true
    label: Single-cell ATAC-seq processing
    summary: Single-cell ATAC-seq libraries were processed with Cell Ranger ATAC and optionally aggregated across samples.
    method_core: Single-cell ATAC-seq libraries were processed with Cell Ranger ATAC using the configured reference package and local resource settings, with optional aggregation across libraries when requested.
    method_details:
      - Count-level processing should be described as per-sample Cell Ranger ATAC analysis of compatible FASTQ inputs.
      - If aggregation is recorded, describe it as a project-level aggregation step that combines successful per-sample outputs.
    important_params:
      - fastq_dir
      - reference
      - cellranger_atac_bin
      - run_aggr
      - localcores
      - localmem
    param_explanations:
      fastq_dir: Input FASTQ directory scanned for Illumina-style sample names.
      reference: Cell Ranger ATAC reference package used for alignment and quantification.
      cellranger_atac_bin: Executable used for both count and optional aggregation.
      run_aggr: Whether aggregated multi-library analysis was attempted after per-sample counting.
      localcores: CPU allocation passed to Cell Ranger ATAC.
      localmem: Memory allocation passed to Cell Ranger ATAC in GB.
    param_context:
      - If run_aggr is true, the final methods text should distinguish per-sample count runs from downstream aggregation.
      - The reference parameter materially affects genome interpretation and should be considered part of the scientific context.
    command_hints:
      - Use runtime_command to recover whether only count was run or whether aggr was also invoked.
      - Prefer software_versions and runtime_command over generic tool assumptions when reporting the Cell Ranger ATAC version.
    tools:
      - Cell Ranger ATAC
    citations:
      - cellranger_atac

  demultiplex:
    category: preprocessing
    publication_relevance: true
    label: Demultiplexing and sequencing quality control
    summary: Sequencing output was demultiplexed into sample-specific sequencing files and quality-control reports.
    method_core: Raw sequencing output was demultiplexed into sample-specific FASTQ files using a facility-managed demultiplexing pipeline based on Illumina BCL conversion, followed by aggregate quality-control reporting.
    method_details:
      - This preprocessing step establishes the sample-specific sequencing files used by downstream analytical templates.
      - When contamination or secondary QC modules are present, describe them as post-demultiplexing QC and screening rather than as primary biological analysis.
    important_params:
      - bcl_dir
      - samplesheet
      - qc_tool
      - contamination_tool
      - threads
      - kraken_db
      - bracken_db
      - fastq_screen_conf
    param_explanations:
      bcl_dir: Sequencing run-folder directory containing the raw BCL data.
      samplesheet: Sample sheet used for sample demultiplexing and lane/sample assignment.
      qc_tool: Quality-control tools selected for FASTQ summarization.
      contamination_tool: Optional contamination-screening tools applied after demultiplexing.
      threads: CPU budget used for QC and contamination modules.
      kraken_db: Kraken2 database used when taxonomic screening is enabled.
      bracken_db: Bracken database used when abundance refinement is enabled.
      fastq_screen_conf: FastQ Screen configuration used when screen-based contamination profiling is enabled.
    param_context:
      - qc_tool and contamination_tool materially affect which post-demultiplex QC outputs exist and should be considered when describing FASTQ quality review.
      - Database or config paths should usually not be copied verbatim into manuscript text, but they are useful context for LLM reasoning.
    command_hints:
      - Use runtime_command and software_versions to recover the actual demultiplexing and QC tool combination instead of assuming defaults.
      - When the runtime command indicates only a subset of optional QC modules was enabled, the methods text should mention only those modules.
    tools:
      - BCL Convert
      - MultiQC
    citations:
      - bcl_convert
      - multiqc

  dgea:
    category: downstream_analysis
    publication_relevance: true
    label: Differential gene expression analysis
    summary: Differential gene expression analysis was prepared in an editable reporting workspace using project-level count and sample metadata.
    method_core: Differential expression analysis and reporting were prepared in an editable analysis workspace built around project-level quantification outputs, sample metadata, and templated downstream statistical reporting.
    method_details:
      - This template should be described as downstream statistical analysis rather than primary read processing.
      - If the run captures a Quarto- or notebook-based workspace, mention that the analysis environment remained editable for project-specific refinement.
    important_params:
      - salmon_dir
      - samplesheet
      - organism
      - spikein
      - application
      - name
      - authors
    param_explanations:
      salmon_dir: Upstream Salmon quantification directory used as the source of transcript-level abundance estimates.
      samplesheet: Sample metadata table used to define sample identity and groups for downstream modeling.
      organism: Organism setting used to shape annotation and downstream defaults.
      spikein: Spike-in context used to decide whether spike-in-aware filtering should be considered.
      application: Analysis application label used to choose downstream reporting defaults.
      name: Human-readable report or project name used in generated outputs.
      authors: Authorship metadata inserted into the generated workspace and reports.
    param_context:
      - salmon_dir and samplesheet together define the quantification and metadata context for downstream statistical reporting.
      - application and organism influence how the reporting workspace is configured and should be retained for LLM reasoning even if not explicitly printed in final prose.
    command_hints:
      - When runtime metadata are sparse, prefer the catalog description plus software_versions to explain this downstream analysis stage.
      - This template often represents a project-editable workspace rather than a single immutable command-line analysis.
    tools:
      - R
      - Quarto
      - DESeq2
    citations:
      - deseq2
      - quarto

  export:
    category: operational
    publication_relevance: false
    label: Project export bundle preparation
    summary: Project outputs and metadata were bundled for downstream delivery through the facility export engine.
    method_core: This template prepares and optionally submits a facility-specific export bundle and is not a scientific analysis step.
    method_details:
      - Export-related templates should normally be excluded from manuscript-ready methods narratives.
    important_params:
      - export_engine_api_url
      - export_engine_backends
      - export_expiry_days
      - metadata_source
      - include_methods_in_spec
    param_explanations:
      export_engine_backends: Delivery backends recorded in the export job specification.
      metadata_source: Mode used to enrich export metadata.
      include_methods_in_spec: Whether generated methods text was embedded in the export specification.
    param_context:
      - These parameters describe delivery and metadata packaging rather than scientific processing.
    command_hints:
      - Treat this as administrative provenance.
    tools:
      - Export engine
    citations: []

  export_bcl:
    category: operational
    publication_relevance: false
    label: Raw BCL export request
    summary: A raw BCL run directory was prepared for export through the facility export engine.
    method_core: This template requests export of a raw BCL run and records the resulting export metadata without altering the source BCL directory.
    method_details:
      - This is an administrative delivery step and should normally not appear in a publication methods section.
    important_params:
      - run_dir
      - project_name
      - bcl_dir
      - export_engine_backends
      - dry_run
    param_explanations:
      run_dir: Source sequencing run directory used for export packaging.
      bcl_dir: BCL directory override used in the export request when different from run_dir.
      export_engine_backends: Delivery backends requested for the export job.
      dry_run: Whether an export specification was prepared without submission.
    param_context:
      - These settings reflect delivery and source-path handling rather than analysis methodology.
    command_hints:
      - Do not present this step as sequencing preprocessing or analytical work.
    tools:
      - Export engine
    citations: []

  export_del:
    category: operational
    publication_relevance: false
    label: Export project deletion
    summary: An export project was removed from the facility export engine.
    method_core: This template performs administrative deletion of an export-engine project and is not relevant to scientific methods reporting.
    method_details:
      - Exclude this step from manuscript-ready methods narratives.
    important_params:
      - project_id
      - confirm_delete
    param_explanations:
      project_id: Export-engine project identifier targeted for deletion.
      confirm_delete: Explicit confirmation flag required to perform deletion.
    param_context:
      - This is purely administrative provenance.
    command_hints:
      - Ignore in publication methods unless there is a special auditing reason to mention it.
    tools:
      - Export engine
    citations: []

  export_demux:
    category: operational
    publication_relevance: false
    label: Ad hoc demultiplex export request
    summary: An ad hoc demultiplex run was prepared for export and canonical export metadata were stored with the source run.
    method_core: This template prepares export metadata for an ad hoc demultiplex run and submits the export request to the facility export engine.
    method_details:
      - This is a delivery and traceability step rather than a scientific analysis stage.
    important_params:
      - run_dir
      - project_name
      - author
      - fastq_dir
      - multiqc_report
      - export_engine_backends
      - dry_run
    param_explanations:
      fastq_dir: FASTQ directory chosen for export.
      multiqc_report: QC report included in the export package.
      export_engine_backends: Delivery backends requested for the export job.
      dry_run: Whether the export specification was prepared without submission.
    param_context:
      - These settings reflect delivery selection and source metadata, not analytical processing.
    command_hints:
      - Do not convert this delivery action into a manuscript methods sentence.
    tools:
      - Export engine
    citations: []

  export_status:
    category: operational
    publication_relevance: false
    label: Export job status query
    summary: The facility export engine was queried for the status of a known export job.
    method_core: This template retrieves delivery status metadata for a previously submitted export job and is not relevant to scientific methods reporting.
    method_details:
      - Exclude this step from publication methods narratives.
    important_params:
      - job_id
      - export_engine_api_url
    param_explanations:
      job_id: Export-engine job identifier queried for status information.
      export_engine_api_url: Export-engine endpoint used for status retrieval.
    param_context:
      - This is administrative tracking information only.
    command_hints:
      - Ignore in scientific methods text.
    tools:
      - Export engine
    citations: []

  methods:
    category: reporting
    publication_relevance: false
    label: Methods draft generation
    summary: Project-level provenance and template catalog information were assembled into manuscript-oriented methods drafts.
    method_core: This template generates methods drafts and supporting provenance artifacts from recorded project history; it is a reporting layer rather than an upstream analytical workflow.
    method_details:
      - This template should not describe itself in its own manuscript methods output.
    important_params:
      - project_dir
      - style
      - use_llm
    param_explanations:
      style: Output style hint used for deterministic drafting and optional LLM polishing.
      use_llm: Whether an OpenAI-compatible API was used to polish deterministic methods drafts.
    param_context:
      - This is a reporting meta-step, not a biological analysis step.
    command_hints:
      - Do not include this step in final methods prose about the underlying experiment.
    tools:
      - Python
      - OpenAI-compatible API
    citations: []

  nfcore_3mrnaseq:
    category: analysis
    publication_relevance: true
    label: 3' mRNA-seq processing
    summary: Transcriptome sequencing data were processed with the nf-core/rnaseq workflow using the configured genome and quantification settings.
    method_core: 3' mRNA-seq libraries were processed with the nf-core/rnaseq workflow under a facility-specific configuration using Nextflow and containerized execution, with alignment, quantification, and QC coordinated under a pinned workflow revision.
    method_details:
      - The methods text should emphasize that this is a facility-specific wrapper around nf-core/rnaseq for 3' mRNA-seq.
      - When ERCC spike-ins are present, the effective genome context should mention the spike-in-augmented reference rather than only the original genome label.
      - When UMI handling is enabled, the final methods text should reflect UMI-aware extraction rather than describing a generic RNA-seq workflow.
    important_params:
      - genome
      - samplesheet
      - umi
      - spikein
      - project_name
      - max_cpus
      - max_memory
    param_explanations:
      genome: Selected facility genome identifier used to choose the reference bundle.
      samplesheet: nf-core/rnaseq input samplesheet describing sample-level FASTQ pairing and strandedness.
      umi: UMI kit description used to enable or disable UMI-aware extraction.
      spikein: Spike-in description that may alter the effective reference choice.
      project_name: MultiQC title and project-level label used in rendered reports.
      max_cpus: CPU cap applied through the generated runtime Nextflow config.
      max_memory: Memory cap applied through the generated runtime Nextflow config.
    param_context:
      - genome, spikein, and umi jointly shape the biological interpretation of the processing workflow and should be considered together.
      - samplesheet is operationally important and should influence LLM reasoning about sample structure even if it is not quoted verbatim in manuscript prose.
      - max_cpus and max_memory are useful provenance context but should usually not dominate the scientific narrative.
    command_hints:
      - Use runtime_command to recover the actual nf-core/rnaseq revision, execution profile, and UMI-specific flags.
      - Use runtime metadata to distinguish the requested genome from the effective genome after ERCC augmentation.
      - Prefer runtime_command and software_versions over generic template summaries when the command captures richer tool context.
    tools:
      - Nextflow
      - nf-core/rnaseq
      - STAR
      - Salmon
    citations:
      - nextflow
      - nfcore_framework
      - nfcore_rnaseq
      - star
      - salmon

  nfcore_methylseq:
    category: analysis
    publication_relevance: true
    label: RRBS methylation-seq processing
    summary: RRBS sequencing data were processed with the nf-core/methylseq workflow using a facility-specific configuration and project-specific genome selection.
    method_core: RRBS libraries were processed with nf-core/methylseq under a pinned workflow revision using Nextflow and containerized execution, with facility-managed reference configuration and project-specific genome selection.
    method_details:
      - RRBS should be named explicitly because it is the default protocol mode for this template.
      - When runtime metadata are available, use the recorded command and generated Nextflow config to recover the actual execution context rather than inferring defaults.
      - If shared FASTA-based references were used to generate downstream indices at runtime, the text should reflect that facility reference handling without overclaiming prebuilt indices.
    important_params:
      - genome
      - rrbs
      - project_name
      - max_cpus
      - max_memory
    param_explanations:
      genome: Selected facility genome identifier used to choose the reference FASTA.
      rrbs: RRBS mode flag for nf-core/methylseq.
      project_name: MultiQC title and project-level label used in rendered reports.
      max_cpus: CPU cap applied through the generated runtime Nextflow config.
      max_memory: Memory cap applied through the generated runtime Nextflow config.
    param_context:
      - genome and rrbs are the most important run-specific scientific settings for this template and should be considered explicitly by the LLM.
      - project_name and resource caps are useful provenance context but usually secondary to assay mode and reference selection.
    command_hints:
      - Use the runtime command to recover the exact nf-core/methylseq revision, execution profile, and whether RRBS mode was enabled.
      - Prefer runtime_command and software_versions over generic template summaries when reporting tool and workflow versions.
    tools:
      - Nextflow
      - nf-core/methylseq
      - Bismark
    citations:
      - nextflow
      - nfcore_framework
      - nfcore_methylseq
      - bismark

