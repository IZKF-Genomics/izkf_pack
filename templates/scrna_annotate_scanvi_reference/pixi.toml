[workspace]
name = "scrna_annotate_scanvi_reference"
channels = ["conda-forge", "bioconda"]
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
run = { cmd = ["python", "run.py"] }
test = { cmd = ["python", "test.py"] }
clean = { cmd = ["bash", "-lc", "rm -rf results .quarto"] }

[dependencies]
python = ">=3.11,<3.13"
quarto = ">=1.6,<2"
jupyter = ">=1.1,<2"
ipykernel = ">=6.29,<7"
scanpy = ">=1.10,<2"
scvi-tools = ">=1.3,<1.4"
anndata = ">=0.12,<1"
numpy = ">=2.0,<3"
pandas = ">=2.2,<3"
scipy = ">=1.14,<2"
openpyxl = ">=3.1,<4"
plotly = ">=6.0,<7"
itables = ">=2.2,<3"
python-tzdata = ">=2024.1"
