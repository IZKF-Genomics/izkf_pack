id: methods_from_paths
version: 0.1.0
description: Use an LLM to generate a publication methods Word document from analysis files and result folders.
tools:
  required:
    - python3
params:
  input_paths:
    type: list[path]
    required: true
    description: Files or directories containing analysis code, configs, QC reports, logs, or result summaries.
  out_file:
    type: path
    default: methods.docx
    description: Output docx path. Relative paths are written under the Linkar results directory.
  title:
    type: str
    default: Methods
    description: Document title.
  style:
    type: str
    default: publication
    description: Output style hint for the prose. Use publication, concise, or technical.
  keep_intermediates:
    type: bool
    default: false
    description: When true, keep markdown, context, references, prompt, and response files next to the docx.
  llm_config:
    type: path
    default: ""
    description: Optional YAML or JSON fallback describing LLM settings.
  llm_base_url:
    type: str
    default: ""
    description: Optional OpenAI-compatible API base URL override. Otherwise use LINKAR_LLM_BASE_URL.
  llm_model:
    type: str
    default: ""
    description: Optional model name override. Otherwise use LINKAR_LLM_MODEL.
  llm_temperature:
    type: float
    default: 0.2
    description: Temperature used for optional LLM polishing.
# Output paths and globs are resolved relative to LINKAR_RESULTS_DIR,
# which defaults to <template_workspace>/results.
outputs:
  results_dir: {}
  methods_docx:
    path: methods.docx
  out_file_path:
    path: out_file.txt
run:
  mode: direct
  command: |
    python3 ./run.py \
      --results-dir "${LINKAR_RESULTS_DIR}" \
      --input-paths "${param:input_paths}" \
      --out-file "${param:out_file}" \
      --title "${param:title}" \
      --style "${param:style}" \
      --keep-intermediates "${param:keep_intermediates}" \
      --llm-config "${param:llm_config}" \
      --llm-base-url "${param:llm_base_url}" \
      --llm-model "${param:llm_model}" \
      --llm-temperature "${param:llm_temperature}"
