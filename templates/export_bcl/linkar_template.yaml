id: export_bcl
version: 0.1.0
description: Submit an export request for a raw BCL run without writing any metadata into the source BCL directory.
tools:
  required:
    - python3
params:
  run_dir:
    type: path
    required: true
    description: Path to the sequencing run directory.
  project_name:
    type: str
    default: ""
    description: Project name recorded in the export request. Defaults to the basename of run_dir.
  bcl_dir:
    type: path
    default: ""
    description: Optional BCL directory override. Defaults to run_dir.
  include_in_report:
    type: bool
    default: true
    description: Default include-in-report flag for exported items.
  include_in_report_bcl:
    type: bool
    default: true
    description: Override include_in_report for the BCL directory export entry.
  export_engine_api_url:
    type: str
    default: http://genomics.rwth-aachen.de:9500/export
    description: Export engine base URL. If it does not end with /export, the suffix is appended automatically.
  export_engine_backends:
    type: str
    default: apache, owncloud, sftp
    description: Comma-separated export backends for the export job spec.
  export_expiry_days:
    type: int
    default: 30
    description: Optional expiry_days value for the export engine job spec.
  export_username:
    type: str
    default: ""
    description: Optional export username. Defaults to a value derived from project_name.
  export_password:
    type: str
    default: ""
    description: Optional export password/token. A random token is generated when omitted.
  poll_interval_seconds:
    type: int
    default: 2
    description: Poll interval in seconds while waiting for the final export status.
  timeout_seconds:
    type: int
    default: 3600
    description: Timeout in seconds while waiting for the final export status.
  dry_run:
    type: bool
    default: false
    description: If true, build and save the export metadata but do not submit anything to the export engine.
outputs:
  results_dir: {}
  export_summary:
    path: export_bcl_summary.json
  export_job_id:
    path: export_job_id.txt
  export_job_spec_redacted:
    path: export_job_spec.redacted.json
  export_response:
    path: export_response.json
  export_final_message:
    path: export_final_message.json
run:
  mode: direct
  verbose_by_default: true
  command: |
    python3 ./run.py \
      --results-dir "${LINKAR_RESULTS_DIR}" \
      --run-dir "${param:run_dir}" \
      --project-name "${param:project_name}" \
      --bcl-dir "${param:bcl_dir}" \
      --include-in-report "${param:include_in_report}" \
      --include-in-report-bcl "${param:include_in_report_bcl}" \
      --export-engine-api-url "${param:export_engine_api_url}" \
      --export-engine-backends "${param:export_engine_backends}" \
      --export-expiry-days "${param:export_expiry_days}" \
      --export-username "${param:export_username}" \
      --export-password "${param:export_password}" \
      --poll-interval-seconds "${param:poll_interval_seconds}" \
      --timeout-seconds "${param:timeout_seconds}" \
      --dry-run "${param:dry_run}"
