id: nfcore_3mrnaseq
version: 0.1.1
description: Facility-specific nf-core/rnaseq wrapper for 3' mRNA-seq runs.
tools:
  required:
    - pixi
    - python3
    - docker
params:
  agendo_id:
    type: str
    default: ""
    description: Optional Agendo request id used to derive genome, UMI metadata, and spike-in metadata via the default binding.
  samplesheet:
    type: path
    required: true
    description: nf-core/rnaseq input samplesheet. With --binding default it can be generated from the latest demultiplex outputs in the active project.
  genome:
    type: str
    required: true
    description: Facility genome identifier such as GRCh38, GRCm39, mRatBN7.2, Sscrofa11.1, or GRCg7b.
  umi:
    type: str
    default: ""
    description: Optional UMI description. The facility default UMI metadata label enables the nf-core UMI flags. CLI shorthand values true, yes, on, and 1 resolve to the facility default UMI setting.
  spikein:
    type: str
    default: ""
    description: Optional spike-in description. Values containing ERCC append _with_ERCC to the selected genome. CLI shorthand values true, yes, on, and 1 resolve to the facility default ERCC spike-in.
  max_cpus:
    type: int
    required: false
    description: Optional CPU cap applied through the generated runtime Nextflow config. The default binding sets this to 80 percent of host CPUs.
  max_memory:
    type: str
    default: ""
    description: Optional memory cap applied through the generated runtime Nextflow config. The default binding sets this to 80 percent of host RAM when detectable.
outputs:
  results_dir: {}
  multiqc_dir:
    path: multiqc
  multiqc_report:
    path: multiqc/multiqc_report.html
  salmon_dir:
    path: salmon
  pipeline_info_dir:
    path: pipeline_info
  software_versions:
    path: software_versions.json
  runtime_command:
    path: runtime_command.json
run:
  mode: render
  command: |
    python3 ./run.py --run-script ./run.sh
render:
  command: |
    python3 ./run.py --render-only --run-script ./run.sh
