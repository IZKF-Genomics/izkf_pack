id: nfcore_3mrnaseq
version: 0.1.0
description: Facility-specific nf-core/rnaseq wrapper for 3' mRNA-seq runs.
tools:
  required:
    - nextflow
    - docker
params:
  agendo_id:
    type: str
    default: ""
    description: Optional Agendo request id used to derive genome, UMI metadata, and spike-in metadata via the default binding.
  samplesheet:
    type: path
    required: true
    description: nf-core/rnaseq input samplesheet. With --binding default it can be generated from the latest demultiplex outputs in the active project.
  genome:
    type: str
    required: true
    description: Facility genome identifier such as GRCh38, GRCm39, mRatBN7.2, or Sscrofa11.1.
  umi:
    type: str
    default: ""
    description: Optional UMI kit description. The known Takara QuantSeq phrase enables the nf-core UMI flags.
  spikein:
    type: str
    default: ""
    description: Optional spike-in description. Values containing ERCC append _with_ERCC to the selected genome.
  max_cpus:
    type: int
    required: false
    description: Optional CPU cap forwarded to nf-core/rnaseq. The default binding sets this to 80 percent of host CPUs.
  max_memory:
    type: str
    default: ""
    description: Optional memory cap forwarded to nf-core/rnaseq. The default binding sets this to 80 percent of host RAM when detectable.
outputs:
  results_dir: {}
  multiqc_dir:
    path: multiqc
  multiqc_report:
    path: multiqc/multiqc_report.html
  salmon_dir:
    path: salmon
  pipeline_info_dir:
    path: pipeline_info
run:
  mode: render
  command: |
    if [[ -z "${param:genome}" || "${param:genome}" == "__EDIT_ME_GENOME__" ]]; then
      echo "[error] genome is unresolved. Edit run.sh and replace __EDIT_ME_GENOME__ with a supported genome before running." >&2
      exit 2
    fi

    effective_genome="${param:genome}"
    if [[ -n "${param:spikein}" && "${param:spikein}" == *ERCC* ]]; then
      effective_genome="${effective_genome}_with_ERCC"
    fi

    echo "[info] $(date) nf-core/rnaseq profile=docker genome=${effective_genome}"
    nextflow -version || true
    mkdir -p "${LINKAR_RESULTS_DIR}"

    max_cpus_flag=""
    if [[ -n "${param:max_cpus:-}" ]]; then
      max_cpus_flag="--max_cpus ${param:max_cpus}"
    fi

    max_memory_flag=""
    if [[ -n "${param:max_memory:-}" ]]; then
      max_memory_flag="--max_memory ${param:max_memory}"
    fi

    if [[ "${param:umi}" == "UMI Second Strand SynthesisModule for QuantSeq FWD" ]]; then
      nextflow run nf-core/rnaseq \
        -r "3.22.2" \
        -profile "docker" \
        -c "nextflow.config" \
        --input "${param:samplesheet}" \
        --outdir "${LINKAR_RESULTS_DIR}" \
        --extra_salmon_quant_args=--noLengthCorrection \
        --extra_star_align_args="--alignIntronMax 1000000 --alignIntronMin 20 --alignMatesGapMax 1000000 --alignSJoverhangMin 8 --outFilterMismatchNmax 999 --outFilterMultimapNmax 20 --outFilterType BySJout --outFilterMismatchNoverLmax 0.1 --clip3pAdapterSeq AAAAAAAA" \
        --genome "${effective_genome}" \
        --igenomes_ignore true \
        --igenomes_base "/data/shared/igenomes/" \
        --gencode \
        --featurecounts_group_type gene_type \
        ${max_cpus_flag} \
        ${max_memory_flag} \
        --with_umi \
        --umitools_extract_method regex \
        --umitools_bc_pattern "^(?P<umi_1>.{8})(?P<discard_1>.{6}).*"
    else
      nextflow run nf-core/rnaseq \
        -r "3.22.2" \
        -profile "docker" \
        -c "nextflow.config" \
        --input "${param:samplesheet}" \
        --outdir "${LINKAR_RESULTS_DIR}" \
        --extra_salmon_quant_args=--noLengthCorrection \
        --extra_star_align_args="--alignIntronMax 1000000 --alignIntronMin 20 --alignMatesGapMax 1000000 --alignSJoverhangMin 8 --outFilterMismatchNmax 999 --outFilterMultimapNmax 20 --outFilterType BySJout --outFilterMismatchNoverLmax 0.1 --clip3pAdapterSeq AAAAAAAA" \
        --genome "${effective_genome}" \
        --igenomes_ignore true \
        --igenomes_base "/data/shared/igenomes/" \
        --gencode \
        --featurecounts_group_type gene_type \
        ${max_cpus_flag} \
        ${max_memory_flag}
    fi

    run_name="$(grep -oP 'Run name:\s+\K\S+' .nextflow.log | tail -n 1 || true)"
    if [[ -n "${run_name}" ]]; then
      nextflow clean "${run_name}" -f || true
    fi
