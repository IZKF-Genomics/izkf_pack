id: nfcore_methylseq
version: 0.1.1
description: Facility-specific nf-core/methylseq wrapper for RRBS runs.
tools:
  required:
    - pixi
    - python3
    - docker
params:
  agendo_id:
    type: str
    default: ""
    description: Optional Agendo request id used to derive genome metadata via the default binding.
  samplesheet:
    type: path
    required: true
    description: nf-core/methylseq input samplesheet. With --binding default it can be generated from the latest demultiplex FASTQ outputs in the active project.
  genome:
    type: str
    required: true
    description: Facility genome identifier such as GRCh38, GRCm39, mRatBN7.2, Sscrofa11.1, or GRCg7b.
  rrbs:
    type: bool
    default: true
    description: Enable Reduced Representation Bisulfite Sequencing (RRBS) mode. This is the default protocol in the lab.
  max_cpus:
    type: int
    required: false
    description: Optional CPU cap applied through the generated runtime Nextflow config. The default binding sets this to 80 percent of host CPUs.
  max_memory:
    type: str
    default: ""
    description: Optional memory cap applied through the generated runtime Nextflow config. The default binding sets this to 80 percent of host RAM when detectable.
outputs:
  results_dir: {}
  multiqc_dir:
    path: multiqc
  multiqc_report:
    path: multiqc/multiqc_report.html
  pipeline_info_dir:
    path: pipeline_info
  software_versions:
    path: software_versions.json
  runtime_command:
    path: runtime_command.json
run:
  mode: render
  entry: run.sh
