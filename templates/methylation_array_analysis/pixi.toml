[workspace]
name = "methylation_array_analysis"
channels = ["conda-forge", "bioconda", "r"]
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
register-local = { cmd = ["python3", "scripts/register_local.py"] }
sync-samples = { cmd = ["python3", "scripts/sync_samples.py"] }
preflight = { cmd = ["python3", "scripts/preflight_inputs.py"] }
analyze = { cmd = ["Rscript", "DNAm_constructor.R"] }
fetch-geo = { cmd = ["python3", "scripts/fetch_geo.py"] }
render-reports = { cmd = ["Rscript", "DNAm_constructor.R"] }
rerun-comparisons = { cmd = ["Rscript", "rerun_failed_comparisons.R"] }
check = { cmd = ["Rscript", "-e", "source('DNAm_functions.R'); validate_workspace(load_project_config('config/datasets.toml'), load_samples('config/samples.csv'))"] }

[dependencies]
quarto = ">=1.6,<2"
pandoc = ">=3,<4"
python = ">=3.11,<3.14"
r-base = ">=4.4,<4.6"
r-rcpptoml = ">=0.2,<0.3"
r-readr = ">=2.1,<3"
r-dplyr = ">=1.1,<2"
r-tibble = ">=3.2,<4"
r-stringr = ">=1.5,<2"
r-purrr = ">=1.0,<2"
r-tidyr = ">=1.3,<2"
r-ggplot2 = ">=3.5,<4"
r-plotly = ">=4.10,<5"
r-htmlwidgets = ">=1.6,<2"
r-uwot = ">=0.2,<1"
r-rtsne = ">=0.17,<1"
r-pheatmap = ">=1.0,<2"
r-ggrepel = ">=0.9,<1"
r-matrixstats = ">=1.5,<2"
r-dt = ">=0.33,<1"
r-rcolorbrewer = ">=1.1_3,<2"
r-yaml = ">=2.3,<3"
r-knitr = ">=1.49,<2"
r-kableextra = ">=1.4,<2"
bioconductor-minfi = ">=1.48,<2"
bioconductor-limma = ">=3.58,<4"
bioconductor-missmethyl = ">=1.36,<2"
bioconductor-dmrcate = ">=3.0,<4"
bioconductor-sva = ">=3.50,<4"
bioconductor-summarizedexperiment = ">=1.32,<2"
bioconductor-genomicranges = ">=1.54,<2"
bioconductor-iranges = ">=2.36,<3"
bioconductor-geoquery = ">=2.70,<3"
bioconductor-annotationdbi = ">=1.64,<2"
bioconductor-genomeinfodbdata = ">=1.2,<2"
bioconductor-illuminahumanmethylation450kmanifest = ">=0.4,<1"
"bioconductor-illuminahumanmethylation450kanno.ilmn12.hg19" = ">=0.6,<1"
bioconductor-illuminahumanmethylationepicmanifest = ">=0.3,<1"
"bioconductor-illuminahumanmethylationepicanno.ilm10b4.hg19" = ">=0.6,<1"
bioconductor-illuminahumanmethylationepicv2manifest = ">=1.0,<2"
"bioconductor-illuminahumanmethylationepicv2anno.20a1.hg38" = ">=1.0,<2"

[pypi-dependencies]
pyyaml = ">=6,<7"
tomlkit = ">=0.13,<1"
