[project]
array_type = "AUTO"
genome_build = "hg38"

[processing]
normalization = "noob"
detection_p_threshold = 0.01
max_failed_probes_fraction = 0.01
exclude_failed_samples = true
top_variable_cpg = 5000

[filter]
remove_snp_probes = true
remove_cross_reactive = false
remove_sex_chr = false
keep_autosomal_only = false

[batch_correction]
enabled = true
method = "limma_removeBatchEffect"
batch_column = "batch"
preserve_columns = ["group"]

[cell_counts]
enabled = false
reference = "blood"

[embeddings]
enable_umap = true

[dmr]
enabled = true
fdr = 0.05
lambda = 1000
C = 2
epicv2_filter = "mean"
epicv2_remap = true

[enrichment]
enabled = true
collections = ["GO", "KEGG"]
top_n = 30

[drilldown]
enabled = true
cpg_ids = ["cg00000029"]
loci = ["chr1:1000000-1010000"]
genes = ["BRCA1"]
max_cpgs_per_locus = 200
heatmap_top_var = 100

[[datasets]]
dataset_id = "dataset_1"
source = "inbox"
path = "data/inbox/dataset_1"
array_type = "EPIC_V2"
enabled = true

[[datasets]]
dataset_id = "dataset_epic_1051943"
source = "inbox"
path = "data/inbox/dataset_epic_1051943"
array_type = "EPIC"
enabled = false

[[datasets]]
dataset_id = "dataset_epic_1052641"
source = "inbox"
path = "data/inbox/dataset_epic_1052641"
array_type = "EPIC"
enabled = false

[[datasets]]
dataset_id = "dataset_epicv2"
source = "inbox"
path = "data/inbox/dataset_epicv2"
array_type = "EPIC_V2"
enabled = false

