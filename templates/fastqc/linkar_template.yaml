id: fastqc
version: 0.1.0
description: Write placeholder FastQC-style outputs under the Linkar results directory.
params:
  input:
    type: path
    required: true
  sample_name:
    type: str
    default: sample
  threads:
    type: int
    default: 4
outputs:
  results_dir: {}
  fastqc_dir: {}
  fastqc_summary:
    path: fastqc/summary.txt
  fastqc_report:
    path: fastqc/report.txt
run:
  entry: run.sh
  mode: direct
