id: scrna_annotate_sctype
version: 0.1.0
description: ScType-focused human/mouse scRNA-seq cluster annotation with standardized JSON output.
tools:
  required:
    - bash
    - python3
    - pixi
params:
  input_h5ad:
    type: str
    default: ""
    description: Prepared `.h5ad` input path. The template reads the upstream file in place.
  input_source_template:
    type: str
    default: ""
    description: Optional provenance label for the upstream template that produced `input_h5ad`.
  organism:
    type: str
    default: "mouse"
    description: Organism for catalog selection. Supported values are `mouse` and `human`.
  organism_id:
    type: str
    default: ""
    description: Optional NCBI Taxon id. Defaults to NCBITaxon:10090 for mouse or NCBITaxon:9606 for human.
  tissue:
    type: str
    default: ""
    description: Optional ScType tissue context used to filter catalog entries when possible.
  cluster_key:
    type: str
    default: "leiden"
    description: Cluster column in `adata.obs`.
  sample_id_key:
    type: str
    default: "sample_id"
    description: Optional sample identifier column in `adata.obs`.
  expression_layer:
    type: str
    default: "X"
    description: Expression layer/view used for marker ranking. Use a normalized/log-transformed layer when available.
  primary_catalog:
    type: str
    default: "download:sctype"
    description: Primary ScType catalog id or TSV path. Defaults to the downloadable public ScType database.
  top_n_markers:
    type: int
    default: 50
    description: Number of ranked marker genes to keep per cluster.
  min_log2fc:
    type: str
    default: "0.25"
    description: Minimum log2 fold-change for informative marker/catalog matching.
  fdr_threshold:
    type: str
    default: "0.05"
    description: Reserved for common annotation schema compatibility; ScType-style v1 scoring does not use it as a hard filter.
  write_h5ad:
    type: bool
    default: true
    description: Write `results/adata.annotated.h5ad` with cluster-level annotation columns added to `adata.obs`.
outputs:
  results_dir: {}
  annotation_result:
    path: results/annotation_result.json
  annotated_h5ad:
    path: results/adata.annotated.h5ad
  html_report:
    path: results/report.html
  quarto_report:
    path: results/report.qmd
  tables:
    glob: results/tables/*.csv
run:
  mode: render
  entry: run.sh
