mappings:
  - template_id: demultiplex
    src_project_key: "templates[id=demultiplex].outputs.output_dir"
    src: "{template_root}/results/output"
    dest: "1_Raw_data/FASTQ"
    report_links:
      - path: "."
        section: raw
        description: "FASTQ output from the demultiplex template."
        link_name: "FASTQ output"

  - template_id: demultiplex
    src_project_key: "templates[id=demultiplex].outputs.multiqc_report"
    src: "{template_root}/results/multiqc/multiqc_report.html"
    dest: "1_Raw_data/demultiplexing_multiqc_report.html"
    report_links:
      - path: "."
        section: raw
        description: "MultiQC report from the demultiplex template."
        link_name: "Demultiplex MultiQC report"

  - template_id: nfcore_3mrnaseq
    src: "{template_root}"
    dest: "2_Processed_data/nfcore_3mrnaseq/{template_basename}"
    report_links:
      - path: "."
        section: processed
        description: "This folder contains the rendered script bundle, configuration, and nf-core/rnaseq results."
        link_name: "{template_basename}"
      - path: "results/multiqc/star_salmon/multiqc_report.html"
        section: processed/MultiQC
        description: "MultiQC report from {template_basename}."
        link_name: "{template_basename} MultiQC"

  - template_id: nfcore_methylseq
    src: "{template_root}"
    dest: "2_Processed_data/nfcore_methylseq"
    report_links:
      - path: "."
        section: processed/Folder
        description: "This folder contains the rendered script bundle, configuration, and nf-core/methylseq results."
        link_name: "nfcore_methylseq"
      - path: "results/multiqc/bismark/multiqc_report.html"
        section: processed/MultiQC
        description: "MultiQC report from nfcore_methylseq."
        link_name: "nfcore_methylseq MultiQC"
      - path: "results/bismark/reports/*_bismark_bt2_PE_report.html"
        section: processed/QC
        description: "Per-sample Bismark paired-end alignment report from nfcore_methylseq."
      - path: "results/bismark/summary/bismark_summary_report.html"
        section: processed/QC
        description: "Combined Bismark summary report from nfcore_methylseq."
        link_name: "nfcore_methylseq Bismark summary"

  - template_id: nfcore_scrnaseq
    src: "{template_root}"
    dest: "2_Processed_data/nfcore_scrnaseq/{template_basename}"
    report_links:
      - path: "."
        section: processed
        description: "This folder contains the rendered script bundle, configuration, and nf-core/scrnaseq results."
        link_name: "{template_basename}"
      - path: "results/multiqc/multiqc_report.html"
        section: processed/MultiQC
        description: "MultiQC report from {template_basename}."
        link_name: "{template_basename} MultiQC"
      - path: "selected_matrix.h5ad"
        section: processed/H5AD
        description: "Preferred downstream AnnData matrix selected from {template_basename}."
        link_name: "{template_basename} selected matrix"

  - template_id: cellranger_atac
    src_project_key: "templates[id=cellranger_atac].outputs.results_dir"
    src: "{template_root}"
    dest: "2_Processed_data/cellranger_atac"
    report_links:
      - path: "."
        section: processed
        description: "Processed results from the cellranger_atac template."
        link_name: "cellranger_atac results"
      - path: "combined/outs/web_summary.html"
        section: processed/QC
        description: "Aggregated web summary report from the cellranger_atac template."
        link_name: "cellranger_atac aggregated web summary"

  - template_id: summary
    src: "{template_root}/results"
    dest: "3_Reports/summary"
    report_links:
      - path: "summary_long.html"
        section: reports/Summary
        description: "Standalone HTML rendering of the long bioinformatics analysis summary."
        link_name: "Long analysis summary HTML"
      - path: "summary_short.html"
        section: reports/Summary
        description: "Standalone HTML rendering of the short bioinformatics analysis summary."
        link_name: "Short analysis summary HTML"

  - template_id: methylation_array_analysis
    src_project_key: "templates[id=methylation_array_analysis].outputs.results_dir"
    src: "{template_root}/results"
    dest: "2_Processed_data/methylation_array_analysis/results"
    report_links:
      - path: "."
        section: processed/Folder
        description: "Processed methylation-array analysis outputs, including result tables, figures, and cached analysis objects."
        link_name: "methylation_array_analysis results"
      - path: "tables"
        section: processed/Tables
        description: "CSV result tables from methylation_array_analysis."
        link_name: "methylation_array_analysis tables"
      - path: "figures"
        section: processed/Figures
        description: "Figure outputs from methylation_array_analysis."
        link_name: "methylation_array_analysis figures"

  - template_id: methylation_array_analysis
    src: "{template_root}/reports"
    dest: "3_Reports/methylation_array_analysis"
    report_links:
      - path: "."
        section: reports/Folder
        description: "Standalone HTML reports generated by methylation_array_analysis."
        link_name: "methylation_array_analysis reports"
      - path: "[0-9][0-9]*.html"
        section: reports/Methylation
        description: "Rendered methylation-array HTML report."

  - template_id: methylation_array_analysis
    src: "{template_root}/results/tables"
    dest: "3_Reports/results/tables"
    report_links:
      - path: "."
        section: reports/Supporting files
        description: "Workbook, CSV, and table artifacts linked from methylation-array HTML reports."
        link_name: "methylation_array_analysis report tables"

  - template_id: scrna_prep
    src: "{template_root}/reports"
    dest: "3_Reports/{template_basename}"
    report_links:
      - path: "scrna_prep.html"
        section: reports/QC
        description: "Primary QC and embedding report generated by {template_basename}."
        link_name: "{template_basename} scRNA preprocessing QC"

  - template_id: scrna_integrate
    src: "{template_root}/results"
    dest: "2_Processed_data/scrna_integrate/{template_basename}/results"
    report_links:
      - path: "."
        section: processed/Folder
        description: "Integrated AnnData object, metric tables, and runtime metadata from {template_basename}."
        link_name: "{template_basename} integration results"
      - path: "adata.integrated.h5ad"
        section: processed/H5AD
        description: "Integrated AnnData object generated by {template_basename}."
        link_name: "{template_basename} integrated AnnData"
      - path: "tables"
        section: processed/Tables
        description: "Integration metric and summary tables from {template_basename}."
        link_name: "{template_basename} integration tables"

  - template_id: scrna_integrate
    src: "{template_root}/reports"
    dest: "3_Reports/scrna_integrate/{template_basename}"
    report_links:
      - path: "scrna_integrate.html"
        section: reports/QC
        description: "Primary integration QC and evaluation report generated by {template_basename}."
        link_name: "{template_basename} scRNA integration QC"

  - template_id: scrna_annotate
    src: "{template_root}/results"
    dest: "2_Processed_data/scrna_annotate/{template_basename}/results"
    report_links:
      - path: "."
        section: processed/Folder
        description: "Annotated AnnData object, review tables, and runtime metadata from {template_basename}."
        link_name: "{template_basename} annotation results"
      - path: "adata.annotated.h5ad"
        section: processed/H5AD
        description: "Annotated AnnData object generated by {template_basename}."
        link_name: "{template_basename} annotated AnnData"
      - path: "tables"
        section: processed/Tables
        description: "Cell- and cluster-level annotation review tables from {template_basename}."
        link_name: "{template_basename} annotation tables"

  - template_id: scrna_annotate
    src: "{template_root}/reports"
    dest: "3_Reports/scrna_annotate/{template_basename}"
    report_links:
      - path: "00_annotation_overview.html"
        section: reports
        description: "Cross-method annotation overview report generated by {template_basename}."
        link_name: "{template_basename} scRNA annotation overview"
      - path: "01_celltypist.html"
        section: reports
        description: "CellTypist-specific annotation report generated by {template_basename}."
        link_name: "{template_basename} CellTypist annotation report"
      - path: "02_scanvi.html"
        section: reports
        description: "scANVI-specific annotation scaffold report generated by {template_basename}."
        link_name: "{template_basename} scANVI annotation report"
      - path: "03_decoupler_review.html"
        section: reports
        description: "decoupler review scaffold report generated by {template_basename}."
        link_name: "{template_basename} decoupler review report"
      - path: "04_scdeepsort.html"
        section: reports
        description: "scDeepSort-specific annotation scaffold report generated by {template_basename}."
        link_name: "{template_basename} scDeepSort annotation report"
      - path: "05_scgpt.html"
        section: reports
        description: "scGPT-specific annotation scaffold report generated by {template_basename}."
        link_name: "{template_basename} scGPT annotation report"

  - template_id: scrna_annotate_celltypist
    src: "{template_root}/results/annotation_result.json"
    dest: "2_Processed_data/scrna_annotate_celltypist/{template_basename}/annotation_result.json"
    report_links:
      - path: "."
        section: processed/Annotation
        description: "Standard CellTypist annotation result JSON generated by {template_basename}."
        link_name: "{template_basename} CellTypist annotation result"

  - template_id: scrna_annotate_celltypist
    src: "{template_root}/results/adata.annotated.h5ad"
    dest: "2_Processed_data/scrna_annotate_celltypist/{template_basename}/adata.annotated.h5ad"
    report_links:
      - path: "."
        section: processed/H5AD
        description: "Annotated AnnData object generated by {template_basename}."
        link_name: "{template_basename} CellTypist annotated AnnData"

  - template_id: scrna_annotate_celltypist
    src: "{template_root}/results/report.html"
    dest: "3_Reports/scrna_annotate_celltypist/{template_basename}/report.html"
    report_links:
      - path: "."
        section: reports/Annotation
        description: "Primary CellTypist scRNA-seq annotation review report generated by {template_basename}."
        link_name: "{template_basename} CellTypist annotation report"

  - template_id: scrna_annotate_celltypist
    src: "{template_root}/results/output.cloupe"
    dest: "3_Reports/scrna_annotate_celltypist/{template_basename}/output.cloupe"
    report_links:
      - path: "."
        section: reports/Loupe
        description: "Optional Loupe Browser export associated with {template_basename}."
        link_name: "{template_basename} CellTypist Loupe Browser file"

  - template_id: scrna_annotate_manual_markers
