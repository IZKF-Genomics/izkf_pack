mappings:
  - template_id: demultiplex
    src_project_key: "templates[id=demultiplex].outputs.output_dir"
    src: "{template_root}/results/output"
    dest: "1_Raw_data/FASTQ"
    report_links:
      - path: "."
        section: raw
        description: "FASTQ output from the demultiplex template."
        link_name: "FASTQ output"

  - template_id: demultiplex
    src_project_key: "templates[id=demultiplex].outputs.multiqc_report"
    src: "{template_root}/results/multiqc/multiqc_report.html"
    dest: "1_Raw_data/demultiplexing_multiqc_report.html"
    report_links:
      - path: "."
        section: raw
        description: "MultiQC report from the demultiplex template."
        link_name: "Demultiplex MultiQC report"

  - template_id: nfcore_3mrnaseq
    src: "{template_root}"
    dest: "2_Processed_data/nfcore_3mrnaseq"
    report_links:
      - path: "."
        section: processed
        description: "This folder contains the rendered script bundle, configuration, and nf-core/rnaseq results."
        link_name: "nfcore_3mrnaseq"
      - path: "results/multiqc/multiqc_report.html"
        section: processed/MultiQC
        description: "MultiQC report from nfcore_3mrnaseq."
        link_name: "nfcore_3mrnaseq MultiQC"

  - template_id: nfcore_methylseq
    src: "{template_root}"
    dest: "2_Processed_data/nfcore_methylseq"
    report_links:
      - path: "."
        section: processed/Folder
        description: "This folder contains the rendered script bundle, configuration, and nf-core/methylseq results."
        link_name: "nfcore_methylseq"
      - path: "results/multiqc/bismark/multiqc_report.html"
        section: processed/MultiQC
        description: "MultiQC report from nfcore_methylseq."
        link_name: "nfcore_methylseq MultiQC"
      - path: "results/bismark/reports/*_bismark_bt2_PE_report.html"
        section: processed/QC
        description: "Per-sample Bismark paired-end alignment report from nfcore_methylseq."
      - path: "results/bismark/summary/bismark_summary_report.html"
        section: processed/QC
        description: "Combined Bismark summary report from nfcore_methylseq."
        link_name: "nfcore_methylseq Bismark summary"

  - template_id: cellranger_atac
    src_project_key: "templates[id=cellranger_atac].outputs.results_dir"
    src: "{template_root}"
    dest: "2_Processed_data/cellranger_atac"
    report_links:
      - path: "."
        section: processed
        description: "Processed results from the cellranger_atac template."
        link_name: "cellranger_atac results"
      - path: "combined/outs/web_summary.html"
        section: processed/QC
        description: "Aggregated web summary report from the cellranger_atac template."
        link_name: "cellranger_atac aggregated web summary"
      - path: "combined/outs/summary.csv"
        section: processed/QC
        description: "Aggregated summary metrics from the cellranger_atac template."
        link_name: "cellranger_atac aggregated summary"
      - path: "aggregation.csv"
        section: processed/Manifests
        description: "Aggregation input manifest generated by the cellranger_atac template."
        link_name: "cellranger_atac aggregation manifest"
      - path: "samples.json"
        section: processed/Manifests
        description: "Discovered sample manifest generated by the cellranger_atac template."
        link_name: "cellranger_atac samples manifest"

  - template_id: methods
    src_project_key: "templates[id=methods].outputs.results_dir"
    src: "{template_root}/results"
    dest: "3_Reports/methods"
    report_links:
      - path: "methods_long.md"
        section: reports/Methods
        description: "Publication-ready long methods draft generated from Linkar project history."
        link_name: "Long methods draft"
      - path: "methods_short.md"
        section: reports/Methods
        description: "Short methods summary generated from Linkar project history."
        link_name: "Short methods summary"
      - path: "methods_references.md"
        section: reports/Methods
        description: "Reference list collected for methods generation."
        link_name: "Methods references"

  - template_id: methylation_array_analysis
    src_project_key: "templates[id=methylation_array_analysis].outputs.results_dir"
    src: "{template_root}/results"
    dest: "2_Processed_data/methylation_array_analysis/results"
    report_links:
      - path: "."
        section: processed/Folder
        description: "Processed methylation-array analysis outputs, including result tables, figures, and cached analysis objects."
        link_name: "methylation_array_analysis results"
      - path: "tables"
        section: processed/Tables
        description: "CSV result tables from methylation_array_analysis."
        link_name: "methylation_array_analysis tables"
      - path: "figures"
        section: processed/Figures
        description: "Figure outputs from methylation_array_analysis."
        link_name: "methylation_array_analysis figures"
      - path: "rds"
        section: processed/RDS
        description: "Serialized R objects and cached comparison bundles from methylation_array_analysis."
        link_name: "methylation_array_analysis R objects"
      - path: "run_info.yaml"
        section: processed/Metadata
        description: "Run metadata captured for methylation_array_analysis."
        link_name: "methylation_array_analysis run info"
      - path: "software_versions.json"
        section: processed/Metadata
        description: "Recorded software versions for methylation_array_analysis."
        link_name: "methylation_array_analysis software versions"

  - template_id: methylation_array_analysis
    src: "{template_root}/reports"
    dest: "3_Reports/methylation_array_analysis"
    report_links:
      - path: "."
        section: reports/Folder
        description: "Standalone HTML reports generated by methylation_array_analysis."
        link_name: "methylation_array_analysis reports"
      - path: "00_study_overview.html"
        section: reports/Methylation
        link_name: "00 Methylation study overview"
      - path: "01_input_qc.html"
        section: reports/Methylation
        link_name: "01 Methylation input QC"
      - path: "02_all_samples_embeddings.html"
        section: reports/Methylation
        link_name: "02 Methylation embeddings"
      - path: "03_batch_diagnostics.html"
        section: reports/Methylation
        link_name: "03 Methylation batch diagnostics"
      - path: "04_Schwannoma_nf2_vs_sox10.html"
        section: reports/Methylation
        link_name: "04 Schwannoma nf2 vs sox10"
      - path: "05_HPNST_vs_Pooled_MutDefined_Schwannoma.html"
        section: reports/Methylation
        link_name: "05 HPNST vs Pooled MutDefined Schwannoma"
      - path: "06_Neurofibroma_vs_Pooled_MutDefined_Schwannoma.html"
        section: reports/Methylation
        link_name: "06 Neurofibroma vs Pooled MutDefined Schwannoma"
      - path: "07_HPNST_vs_Neurofibroma.html"
        section: reports/Methylation
        link_name: "07 HPNST vs Neurofibroma"
      - path: "08_ANNUBP_vs_Neurofibroma_All.html"
        section: reports/Methylation
        link_name: "08 ANNUBP vs Neurofibroma All"
      - path: "09_ANNUBP_vs_Pooled_MutDefined_Schwannoma.html"
        section: reports/Methylation
        link_name: "09 ANNUBP vs Pooled MutDefined Schwannoma"
      - path: "10_ANNUBP_vs_HPNST.html"
        section: reports/Methylation
        link_name: "10 ANNUBP vs HPNST"
      - path: "11_ANNUBP_vs_Neurofibroma_SamePatientSubset.html"
        section: reports/Methylation
        link_name: "11 ANNUBP vs Neurofibroma SamePatientSubset"
      - path: "12_SOX10mut_vs_NonSOX10_MutDefined.html"
        section: reports/Methylation
        link_name: "12 SOX10mut vs NonSOX10 MutDefined"
      - path: "13_HPNST_SC_vs_HPNST_Total.html"
        section: reports/Methylation
        link_name: "13 HPNST SC vs HPNST Total"
      - path: "14_HPNST_Nfib_vs_HPNST_Total.html"
        section: reports/Methylation
        link_name: "14 HPNST Nfib vs HPNST Total"
      - path: "15_HPNST_SC_vs_HPNST_Nfib.html"
        section: reports/Methylation
        link_name: "15 HPNST SC vs HPNST Nfib"

  - template_id: scverse_scrna_prep
    src_project_key: "templates[id=scverse_scrna_prep].outputs.results_dir"
    src: "{template_root}/results"
    dest: "2_Processed_data/scverse_scrna_prep/results"
    report_links:
      - path: "."
        section: processed/Folder
        description: "Processed scRNA-seq preprocessing outputs from scverse_scrna_prep, including the prepared AnnData object and QC tables."
        link_name: "scverse_scrna_prep results"
      - path: "adata.prep.h5ad"
        section: processed/H5AD
        description: "Prepared AnnData object from scverse_scrna_prep."
        link_name: "scverse_scrna_prep adata"
      - path: "tables"
        section: processed/Tables
        description: "QC and clustering summary tables from scverse_scrna_prep."
        link_name: "scverse_scrna_prep tables"
      - path: "run_info.yaml"
        section: processed/Metadata
        description: "Run metadata captured for scverse_scrna_prep."
        link_name: "scverse_scrna_prep run info"
      - path: "software_versions.json"
        section: processed/Metadata
        description: "Recorded software versions for scverse_scrna_prep."
        link_name: "scverse_scrna_prep software versions"

  - template_id: scverse_scrna_prep
    src: "{template_root}/reports"
    dest: "3_Reports/scverse_scrna_prep"
    report_links:
      - path: "."
        section: reports/Folder
        description: "Standalone HTML reports generated by scverse_scrna_prep."
        link_name: "scverse_scrna_prep reports"
      - path: "00_qc.html"
        section: reports/scRNA
        description: "Primary QC and embedding report generated by scverse_scrna_prep."
        link_name: "00 scRNA preprocessing QC"
