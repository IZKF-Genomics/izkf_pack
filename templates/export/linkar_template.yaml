id: export
version: 0.1.2
description: Prepare and submit an export bundle from Linkar project history.
tools:
  required:
    - python3
params:
  prepare_only:
    type: bool
    default: false
    description: When true, prepare the selected export bundle state and stop before API submission.
  refresh:
    type: bool
    default: false
    description: When true, refresh an existing export job in place instead of creating a new export.
  job_id:
    type: str
    default: ""
    description: Existing export job id used by refresh. If omitted, saved export state is used.
  reuse_spec:
    type: bool
    default: false
    description: When true, submit or inspect the current export_job_spec.json without rebuilding it.
  reuse_credentials:
    type: bool
    default: false
    description: When true, rebuild export_job_spec.json while preserving saved credentials from prior export artifacts.
  export_engine_api_url:
    type: str
    default: http://genomics.rwth-aachen.de:9500
    description: Base URL of the facility export engine. The template appends /export if needed.
  export_engine_backends:
    type: str
    default: apache, owncloud, sftp
    description: Comma-separated export backends recorded in export_job_spec.json.
  export_expiry_days:
    type: int
    default: 30
    description: Retention period passed to the export engine job spec.
  export_username:
    type: str
    default: ""
    description: Optional export username override. If omitted, the template derives it from the project name when possible.
  export_password:
    type: str
    default: ""
    description: Optional export password override. If omitted, a random token is generated during bundle creation.
  agendo_id:
    type: str
    default: ""
    description: Optional Agendo request id used for metadata lookup and recorded in metadata_context.yaml.
  flowcell_id:
    type: str
    default: ""
    description: Optional flowcell id used for metadata lookup and recorded in metadata_context.yaml.
  metadata_source:
    type: str
    default: auto
    description: Metadata source mode. Use auto, api, file, mock, or none.
  metadata_file:
    type: path
    default: ""
    description: Optional JSON or YAML metadata payload used when metadata_source=file or preferred in auto mode.
  metadata_api_url:
    type: str
    default: https://genomics.rwth-aachen.de/api
    description: Base URL for metadata enrichment.
  metadata_api_endpoint:
    type: str
    default: /project-output
    description: Endpoint appended to metadata_api_url for metadata lookup.
  metadata_api_timeout:
    type: int
    default: 20
    description: Timeout in seconds for metadata API requests.
  include_summary_in_spec:
    type: bool
    default: true
    description: When true, include generated analysis summary text and context in export_job_spec.json.
  summary_style:
    type: str
    default: full
    description: Summary report style. Use full or concise.
  poll_interval_seconds:
    type: int
    default: 2
    description: Poll interval in seconds while waiting for the export engine to return the final status.
  timeout_seconds:
    type: int
    default: 3600
    description: Timeout in seconds while waiting for the export engine final status.
# Output paths and globs are resolved relative to LINKAR_RESULTS_DIR,
# which defaults to <template_workspace>/results.
outputs:
  results_dir: {}
  export_job_spec:
    path: export_job_spec.json
  export_refresh_spec:
    path: export_refresh_spec.json
  metadata_context:
    path: metadata_context.yaml
  metadata_raw:
    path: metadata_raw.json
  metadata_normalized:
    path: metadata_normalized.yaml
  project_summary:
    path: project_summary.md
  summary_context:
    path: summary_context.yaml
  export_submission:
    path: export_submission.json
  export_state:
    path: export_state.json
  export_job_id:
    path: export_job_id.txt
  export_final_message:
    path: export_final_message.txt
  export_final_path:
    path: export_final_path.txt
run:
  mode: render
  verbose_by_default: true
  command: |
    python3 ./run.py \
      --results-dir "${LINKAR_RESULTS_DIR}" \
      --project-dir "${LINKAR_PROJECT_DIR:-..}" \
      --template-dir "." \
      --prepare-only "${param:prepare_only}" \
      --refresh "${param:refresh}" \
      --job-id "${param:job_id}" \
      --reuse-spec "${param:reuse_spec}" \
      --reuse-credentials "${param:reuse_credentials}" \
      --export-engine-api-url "${param:export_engine_api_url}" \
      --export-engine-backends "${param:export_engine_backends}" \
      --export-expiry-days "${param:export_expiry_days}" \
      --export-username "${param:export_username}" \
      --export-password "${param:export_password}" \
      --agendo-id "${param:agendo_id}" \
      --flowcell-id "${param:flowcell_id}" \
      --metadata-source "${param:metadata_source}" \
      --metadata-file "${param:metadata_file}" \
      --metadata-api-url "${param:metadata_api_url}" \
      --metadata-api-endpoint "${param:metadata_api_endpoint}" \
      --metadata-api-timeout "${param:metadata_api_timeout}" \
      --include-summary-in-spec "${param:include_summary_in_spec}" \
      --summary-style "${param:summary_style}" \
      --poll-interval-seconds "${param:poll_interval_seconds}" \
      --timeout-seconds "${param:timeout_seconds}"
render:
  command: |
    project_dir="${LINKAR_PROJECT_DIR:-..}"
    if [[ ! -f "${project_dir}/project.yaml" ]]; then
      echo "[error] export must be rendered inside a Linkar project directory." >&2
      exit 2
    fi

    build_args=(
      python3 ./build_export_bundle.py
      --project-dir "${project_dir}"
      --template-dir "."
      --results-dir "./results"
      --export-engine-backends "${param:export_engine_backends}"
      --export-expiry-days "${param:export_expiry_days}"
      --export-username "${param:export_username}"
      --export-password "${param:export_password}"
      --reuse-saved-credentials "${param:reuse_credentials}"
      --agendo-id "${param:agendo_id}"
      --flowcell-id "${param:flowcell_id}"
      --metadata-source "${param:metadata_source}"
      --metadata-file "${param:metadata_file}"
      --metadata-api-url "${param:metadata_api_url}"
      --metadata-api-endpoint "${param:metadata_api_endpoint}"
      --metadata-api-timeout "${param:metadata_api_timeout}"
      --include-summary-in-spec "${param:include_summary_in_spec}"
      --summary-style "${param:summary_style}"
    )
    if [[ "${param:reuse_spec}" == "true" ]]; then
      build_args+=(--skip-if-spec-exists)
    fi

    "${build_args[@]}"
